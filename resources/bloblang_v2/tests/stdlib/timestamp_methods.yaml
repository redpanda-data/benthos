description: "Timestamp methods: ts_parse, ts_format, ts_unix*, ts_from_unix*, ts_add"

tests:
  # --- ts_parse ---

  - name: "ts_parse default format RFC 3339"
    mapping: |
      output = "2024-01-15T10:30:00Z".ts_parse()
    output: {_type: "timestamp", value: "2024-01-15T10:30:00Z"}

  - name: "ts_parse with fractional seconds"
    mapping: |
      output = "2024-01-15T10:30:00.123Z".ts_parse()
    output: {_type: "timestamp", value: "2024-01-15T10:30:00.123Z"}

  - name: "ts_parse with timezone offset"
    mapping: |
      output = "2024-01-15T10:30:00+05:30".ts_parse()
    output: {_type: "timestamp", value: "2024-01-15T10:30:00+05:30"}

  - name: "ts_parse with negative offset"
    mapping: |
      output = "2024-01-15T10:30:00-08:00".ts_parse()
    output: {_type: "timestamp", value: "2024-01-15T10:30:00-08:00"}

  - name: "ts_parse custom format date only"
    mapping: |
      output = "2024-01-15".ts_parse("%Y-%m-%d")
    output: {_type: "timestamp", value: "2024-01-15T00:00:00Z"}

  - name: "ts_parse invalid string errors"
    mapping: |
      output = "not-a-date".ts_parse("%Y-%m-%d")
    error: "parse"

  - name: "ts_parse returns timestamp type"
    mapping: |
      output = "2024-01-15T10:30:00Z".ts_parse().type()
    output: "timestamp"

  - name: "ts_parse named format arg"
    mapping: |
      output = "2024-01-15".ts_parse(format: "%Y-%m-%d")
    output: {_type: "timestamp", value: "2024-01-15T00:00:00Z"}

  # --- ts_format ---

  - name: "ts_format default RFC 3339"
    mapping: |
      output = timestamp(2024, 1, 15, 10, 30, 0).ts_format()
    output: "2024-01-15T10:30:00Z"

  - name: "ts_format custom date only"
    mapping: |
      output = timestamp(2024, 1, 15).ts_format("%Y-%m-%d")
    output: "2024-01-15"

  - name: "ts_format with fractional seconds"
    mapping: |
      output = timestamp(2024, 1, 15, 10, 30, 0, 500000000).ts_format()
    output: "2024-01-15T10:30:00.5Z"

  - name: "ts_format whole seconds omit fraction"
    mapping: |
      output = timestamp(2024, 1, 15, 10, 30, 0).ts_format()
    output: "2024-01-15T10:30:00Z"

  - name: "ts_format matches string conversion"
    mapping: |
      $ts = timestamp(2024, 1, 15, 10, 30, 0)
      output = $ts.ts_format() == $ts.string()
    output: true

  - name: "ts_format named format arg"
    mapping: |
      output = timestamp(2024, 1, 15).ts_format(format: "%Y-%m-%d")
    output: "2024-01-15"

  # --- ts_unix ---

  - name: "ts_unix returns epoch seconds"
    mapping: |
      output = timestamp(2024, 1, 15, 10, 30, 0).ts_unix()
    output: 1705313400

  - name: "ts_unix returns int64"
    mapping: |
      output = timestamp(2024, 1, 15, 10, 30, 0).ts_unix().type()
    output: "int64"

  - name: "ts_unix epoch zero"
    mapping: |
      output = timestamp(1970, 1, 1, 0, 0, 0).ts_unix()
    output: 0

  - name: "ts_unix truncates sub-second"
    mapping: |
      output = timestamp(2024, 1, 15, 10, 30, 0, 999999999).ts_unix()
    output: 1705313400

  # --- ts_unix_milli ---

  - name: "ts_unix_milli returns epoch millis"
    mapping: |
      output = timestamp(2024, 1, 15, 10, 30, 0).ts_unix_milli()
    output: 1705313400000

  - name: "ts_unix_milli with fractional seconds"
    mapping: |
      output = timestamp(2024, 1, 15, 10, 30, 0, 123000000).ts_unix_milli()
    output: 1705313400123

  - name: "ts_unix_milli returns int64"
    mapping: |
      output = timestamp(2024, 1, 15, 10, 30, 0).ts_unix_milli().type()
    output: "int64"

  # --- ts_unix_micro ---

  - name: "ts_unix_micro returns epoch micros"
    mapping: |
      output = timestamp(2024, 1, 15, 10, 30, 0).ts_unix_micro()
    output: 1705313400000000

  - name: "ts_unix_micro with fractional seconds"
    mapping: |
      output = timestamp(2024, 1, 15, 10, 30, 0, 123456000).ts_unix_micro()
    output: 1705313400123456

  # --- ts_unix_nano ---

  - name: "ts_unix_nano returns epoch nanos"
    mapping: |
      output = timestamp(2024, 1, 15, 10, 30, 0).ts_unix_nano()
    output: 1705313400000000000

  - name: "ts_unix_nano with full precision"
    mapping: |
      output = timestamp(2024, 1, 15, 10, 30, 0, 123456789).ts_unix_nano()
    output: 1705313400123456789

  - name: "ts_unix_nano returns int64"
    mapping: |
      output = timestamp(2024, 1, 15, 10, 30, 0).ts_unix_nano().type()
    output: "int64"

  # --- ts_from_unix ---

  - name: "ts_from_unix integer seconds"
    mapping: |
      output = 1705313400.ts_from_unix()
    output: {_type: "timestamp", value: "2024-01-15T10:30:00Z"}

  - name: "ts_from_unix float sub-second"
    mapping: |
      output = 1705313400.5.ts_from_unix()
    output: {_type: "timestamp", value: "2024-01-15T10:30:00.5Z"}

  - name: "ts_from_unix epoch zero"
    mapping: |
      output = 0.ts_from_unix()
    output: {_type: "timestamp", value: "1970-01-01T00:00:00Z"}

  - name: "ts_from_unix returns timestamp type"
    mapping: |
      output = 1705313400.ts_from_unix().type()
    output: "timestamp"

  # --- ts_from_unix_milli ---

  - name: "ts_from_unix_milli whole seconds"
    mapping: |
      output = 1705313400000.ts_from_unix_milli()
    output: {_type: "timestamp", value: "2024-01-15T10:30:00Z"}

  - name: "ts_from_unix_milli with millis"
    mapping: |
      output = 1705313400123.ts_from_unix_milli()
    output: {_type: "timestamp", value: "2024-01-15T10:30:00.123Z"}

  # --- ts_from_unix_micro ---

  - name: "ts_from_unix_micro whole seconds"
    mapping: |
      output = 1705313400000000.ts_from_unix_micro()
    output: {_type: "timestamp", value: "2024-01-15T10:30:00Z"}

  - name: "ts_from_unix_micro with micros"
    mapping: |
      output = 1705313400123456.ts_from_unix_micro()
    output: {_type: "timestamp", value: "2024-01-15T10:30:00.123456Z"}

  # --- ts_from_unix_nano ---

  - name: "ts_from_unix_nano whole seconds"
    mapping: |
      output = 1705313400000000000.ts_from_unix_nano()
    output: {_type: "timestamp", value: "2024-01-15T10:30:00Z"}

  - name: "ts_from_unix_nano with full precision"
    mapping: |
      output = 1705313400123456789.ts_from_unix_nano()
    output: {_type: "timestamp", value: "2024-01-15T10:30:00.123456789Z"}

  # --- Round-trips ---

  - name: "ts_unix round-trip"
    mapping: |
      $ts = timestamp(2024, 1, 15, 10, 30, 0)
      output = $ts.ts_unix().ts_from_unix() == $ts
    output: true

  - name: "ts_unix_milli round-trip"
    mapping: |
      $ts = timestamp(2024, 1, 15, 10, 30, 0, 123000000)
      output = $ts.ts_unix_milli().ts_from_unix_milli() == $ts
    output: true

  - name: "ts_unix_micro round-trip"
    mapping: |
      $ts = timestamp(2024, 1, 15, 10, 30, 0, 123456000)
      output = $ts.ts_unix_micro().ts_from_unix_micro() == $ts
    output: true

  - name: "ts_unix_nano round-trip lossless"
    mapping: |
      $ts = timestamp(2024, 1, 15, 10, 30, 0, 123456789)
      output = $ts.ts_unix_nano().ts_from_unix_nano() == $ts
    output: true

  - name: "ts_parse ts_format round-trip"
    mapping: |
      $s = "2024-01-15T10:30:00.123Z"
      output = $s.ts_parse().ts_format()
    output: "2024-01-15T10:30:00.123Z"

  # --- ts_add ---

  - name: "ts_add one second"
    mapping: |
      output = timestamp(2024, 1, 15, 10, 30, 0).ts_add(second())
    output: {_type: "timestamp", value: "2024-01-15T10:30:01Z"}

  - name: "ts_add one minute"
    mapping: |
      output = timestamp(2024, 1, 15, 10, 30, 0).ts_add(minute())
    output: {_type: "timestamp", value: "2024-01-15T10:31:00Z"}

  - name: "ts_add one hour"
    mapping: |
      output = timestamp(2024, 1, 15, 10, 30, 0).ts_add(hour())
    output: {_type: "timestamp", value: "2024-01-15T11:30:00Z"}

  - name: "ts_add one day"
    mapping: |
      output = timestamp(2024, 1, 15, 10, 30, 0).ts_add(day())
    output: {_type: "timestamp", value: "2024-01-16T10:30:00Z"}

  - name: "ts_add negative subtracts"
    mapping: |
      output = timestamp(2024, 1, 15, 10, 30, 0).ts_add(second() * -1)
    output: {_type: "timestamp", value: "2024-01-15T10:29:59Z"}

  - name: "ts_add negative crosses day boundary"
    mapping: |
      output = timestamp(2024, 1, 15, 0, 0, 0).ts_add(second() * -1)
    output: {_type: "timestamp", value: "2024-01-14T23:59:59Z"}

  - name: "ts_add multiple hours"
    mapping: |
      output = timestamp(2024, 1, 15, 10, 30, 0).ts_add(hour() * 3)
    output: {_type: "timestamp", value: "2024-01-15T13:30:00Z"}

  - name: "ts_add compound duration"
    mapping: |
      output = timestamp(2024, 1, 15, 10, 30, 0).ts_add(hour() + 30 * minute())
    output: {_type: "timestamp", value: "2024-01-15T12:00:00Z"}

  - name: "ts_add zero is identity"
    mapping: |
      $ts = timestamp(2024, 1, 15, 10, 30, 0)
      output = $ts.ts_add(0) == $ts
    output: true

  - name: "ts_add named arg"
    mapping: |
      output = timestamp(2024, 1, 15, 10, 30, 0).ts_add(nanos: second())
    output: {_type: "timestamp", value: "2024-01-15T10:30:01Z"}

  - name: "ts_add crosses leap day"
    mapping: |
      output = timestamp(2024, 2, 28, 12, 0, 0).ts_add(day())
    output: {_type: "timestamp", value: "2024-02-29T12:00:00Z"}
