description: ".not_null() — returns value if not null, throws error on null, optional custom message"

tests:
  # --- Passthrough for non-null values ---

  - name: "not_null passes through string"
    mapping: |
      output.result = "hello".not_null()
    output: {"result": "hello"}

  - name: "not_null passes through integer"
    mapping: |
      output.result = 42.not_null()
    output: {"result": 42}

  - name: "not_null passes through zero"
    mapping: |
      output.result = 0.not_null()
    output: {"result": 0}

  - name: "not_null passes through false"
    mapping: |
      output.result = false.not_null()
    output: {"result": false}

  - name: "not_null passes through empty string"
    mapping: |
      output.result = "".not_null()
    output: {"result": ""}

  - name: "not_null passes through empty array"
    mapping: |
      output.result = [].not_null()
    output: {"result": []}

  - name: "not_null passes through empty object"
    mapping: |
      output.result = {}.not_null()
    output: {"result": {}}

  # --- Error on null with default message ---

  - name: "not_null on null produces default error"
    mapping: |
      output.result = null.not_null()
    error: "unexpected null value"

  - name: "not_null on null input field produces default error"
    input: {}
    mapping: |
      output.result = input.missing_field.not_null()
    error: "unexpected null value"

  # --- Error on null with custom message ---

  - name: "not_null with custom message on null"
    mapping: |
      output.result = null.not_null("name required")
    error: "name required"

  - name: "not_null with custom message on missing input field"
    input: {}
    mapping: |
      output.result = input.email.not_null("email is required")
    error: "email is required"

  - name: "not_null custom message ignored when value present"
    mapping: |
      output.result = "exists".not_null("should not appear")
    output: {"result": "exists"}

  # --- Caught by catch ---

  - name: "not_null error caught by catch — default message"
    mapping: |
      output.result = null.not_null().catch(err -> "was null")
    output: {"result": "was null"}

  - name: "not_null error caught by catch — custom message accessible"
    mapping: |
      output.result = null.not_null("name required").catch(err -> err.what)
    output: {"result": "name required"}

  - name: "not_null error caught by catch with fallback value"
    input: {}
    mapping: |
      output.result = input.name.not_null("missing").catch(err -> "anonymous")
    output: {"result": "anonymous"}

  # --- Chained with or ---

  - name: "or rescues null before not_null is reached"
    input: {}
    mapping: |
      output.result = input.name.or("default").not_null()
    output: {"result": "default"}

  - name: "not_null then or — error propagates through or"
    mapping: |
      output.result = null.not_null().or("default")
    error: "unexpected null value"

  # --- In postfix chain ---

  - name: "not_null in chain with subsequent method"
    mapping: |
      output.result = "hello".not_null().uppercase()
    output: {"result": "HELLO"}

  - name: "not_null error skips subsequent methods"
    mapping: |
      output.result = null.not_null().uppercase()
    error: "unexpected null value"

  - name: "not_null on result of field access"
    input: {"user": {"name": "alice"}}
    mapping: |
      output.result = input.user.name.not_null("user name required")
    output: {"result": "alice"}

  # --- Used in conditional patterns ---

  - name: "not_null in match arm validates value"
    input: {"val": null}
    mapping: |
      output.result = match input.val {
        null => throw("got null"),
        _ as v => v.not_null(),
      }
    error: "got null"

  - name: "not_null with catch as validation pattern"
    input: {"name": null}
    mapping: |
      output.result = input.name.not_null("name required").catch(err -> "unknown")
    output: {"result": "unknown"}
