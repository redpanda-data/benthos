description: "Metadata: read/write/delete metadata keys, clear all, copy from input, nested paths, type restrictions, input metadata access"

tests:
  # --- Write metadata ---

  - name: "write single metadata key"
    mapping: |
      output@.source = "kafka"
    output: {}
    output_metadata: {"source": "kafka"}

  - name: "write multiple metadata keys"
    mapping: |
      output@.source = "kafka"
      output@.topic = "events"
      output@.partition = 3
    output: {}
    output_metadata: {"source": "kafka", "topic": "events", "partition": 3}

  - name: "metadata value can be any type"
    mapping: |
      output@.str = "hello"
      output@.num = 42
      output@.flag = true
      output@.arr = [1, 2, 3]
      output@.obj = {"nested": "value"}
      output@.nothing = null
    output: {}
    output_metadata: {"str": "hello", "num": 42, "flag": true, "arr": [1, 2, 3], "obj": {"nested": "value"}, "nothing": null}

  - name: "overwrite metadata key"
    mapping: |
      output@.key = "first"
      output@.key = "second"
    output: {}
    output_metadata: {"key": "second"}

  # --- Nested metadata paths with auto-creation ---

  - name: "nested metadata path auto-creates intermediate objects"
    mapping: |
      output@.routing.region = "us-west"
    output: {}
    output_metadata: {"routing": {"region": "us-west"}}

  - name: "deeply nested metadata path"
    mapping: |
      output@.a.b.c = "deep"
    output: {}
    output_metadata: {"a": {"b": {"c": "deep"}}}

  - name: "sibling nested metadata paths"
    mapping: |
      output@.routing.region = "us-west"
      output@.routing.zone = "a"
    output: {}
    output_metadata: {"routing": {"region": "us-west", "zone": "a"}}

  # --- Delete metadata key ---

  - name: "delete metadata key with deleted()"
    mapping: |
      output@.keep = "yes"
      output@.remove = "no"
      output@.remove = deleted()
    output: {}
    output_metadata: {"keep": "yes"}

  - name: "delete non-existent metadata key is no-op"
    mapping: |
      output@.key = "value"
      output@.missing = deleted()
    output: {}
    output_metadata: {"key": "value"}

  # --- Clear all metadata ---

  - name: "clear all metadata with empty object"
    mapping: |
      output@.a = 1
      output@.b = 2
      output@ = {}
    output: {}
    output_metadata: {}

  - name: "clear then set new metadata"
    mapping: |
      output@.old = "stale"
      output@ = {}
      output@.fresh = "new"
    output: {}
    output_metadata: {"fresh": "new"}

  # --- Copy all metadata from input ---

  - name: "copy all metadata from input"
    input: {}
    input_metadata: {"source": "kafka", "topic": "events"}
    mapping: |
      output@ = input@
    output: {}
    output_metadata: {"source": "kafka", "topic": "events"}

  - name: "copy metadata from input then add more"
    input: {}
    input_metadata: {"source": "kafka"}
    mapping: |
      output@ = input@
      output@.extra = "added"
    output: {}
    output_metadata: {"source": "kafka", "extra": "added"}

  - name: "copy metadata from input then overwrite key"
    input: {}
    input_metadata: {"source": "kafka"}
    mapping: |
      output@ = input@
      output@.source = "http"
    output: {}
    output_metadata: {"source": "http"}

  - name: "copy metadata from input is COW"
    input: {}
    input_metadata: {"key": "original"}
    mapping: |
      output@ = input@
      output@.key = "modified"
      output.input_meta = input@.key
    output: {"input_meta": "original"}
    output_metadata: {"key": "modified"}

  # --- Type restrictions ---

  - name: "output@ = deleted() is error"
    mapping: |
      output@ = deleted()
    error: "metadata"

  - name: "output@ = string is error"
    mapping: |
      output@ = "not an object"
    error: "metadata"

  - name: "output@ = integer is error"
    mapping: |
      output@ = 42
    error: "metadata"

  - name: "output@ = array is error"
    mapping: |
      output@ = [1, 2, 3]
    error: "metadata"

  - name: "output@ = boolean is error"
    mapping: |
      output@ = true
    error: "metadata"

  # --- Read input metadata ---

  - name: "read input metadata key"
    input: {}
    input_metadata: {"source": "kafka"}
    mapping: |
      output.v = input@.source
    output: {"v": "kafka"}

  - name: "read all input metadata"
    input: {}
    input_metadata: {"a": 1, "b": 2}
    mapping: |
      output.v = input@
    output: {"v": {"a": 1, "b": 2}}

  - name: "undefined input metadata key returns null"
    input: {}
    input_metadata: {}
    mapping: |
      output.v = input@.missing
    output: {"v": null}

  - name: "read nested input metadata value"
    input: {}
    input_metadata: {"config": {"timeout": 30}}
    mapping: |
      output.v = input@.config.timeout
    output: {"v": 30}
