description: "If as expression: returning values, else-if chains, void from if-without-else"

tests:
  - name: "if-else expression returns value"
    mapping: |
      output.v = if input.flag { "yes" } else { "no" }
    cases:
      - name: "true branch"
        input: {"flag": true}
        output: {"v": "yes"}
      - name: "false branch"
        input: {"flag": false}
        output: {"v": "no"}

  - name: "if expression with computed value"
    mapping: |
      output.grade = if input.score >= 90 { "A" } else { "B" }
    cases:
      - name: "A grade"
        input: {"score": 95}
        output: {"grade": "A"}
      - name: "B grade"
        input: {"score": 75}
        output: {"grade": "B"}

  - name: "else-if chain"
    mapping: |
      output.tier = if input.score >= 90 {
        "gold"
      } else if input.score >= 70 {
        "silver"
      } else {
        "bronze"
      }
    cases:
      - name: "first branch"
        input: {"score": 95}
        output: {"tier": "gold"}
      - name: "middle branch"
        input: {"score": 75}
        output: {"tier": "silver"}
      - name: "else branch"
        input: {"score": 30}
        output: {"tier": "bronze"}

  - name: "if-without-else produces void when false — preserves prior value"
    mapping: |
      output.status = "pending"
      output.status = if false { "override" }
    output: {"status": "pending"}

  - name: "if-without-else produces value when true"
    mapping: |
      output.x = if true { "hello" }
    output: {"x": "hello"}

  - name: "if-without-else void leaves field absent"
    mapping: |
      output.x = if false { "hello" }
    output: {}

  - name: "if expression with block body and local variables"
    mapping: |
      output.result = if true {
        $a = 10
        $b = 20
        $a + $b
      } else {
        0
      }
    output: {"result": 30}

  - name: "if expression assigned to variable"
    mapping: |
      $label = if true { "active" } else { "inactive" }
      output.v = $label
    output: {"v": "active"}
