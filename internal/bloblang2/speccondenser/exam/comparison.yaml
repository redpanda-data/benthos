description: "Comparison operators: greater than, less than, greater or equal, less or equal"

tests:
  - name: "greater than"
    mapping: |
      output.result = input.a > input.b
    cases:
      - name: "true when left is larger"
        input: {"a": 10, "b": 3}
        output: {"result": true}
      - name: "false when left is smaller"
        input: {"a": 3, "b": 10}
        output: {"result": false}
      - name: "false when equal"
        input: {"a": 5, "b": 5}
        output: {"result": false}
      - name: "int vs float with promotion"
        input: {"a": 5, "b": 4.5}
        output: {"result": true}

  - name: "less than"
    mapping: |
      output.result = input.a < input.b
    cases:
      - name: "true when left is smaller"
        input: {"a": 3, "b": 10}
        output: {"result": true}
      - name: "false when left is larger"
        input: {"a": 10, "b": 3}
        output: {"result": false}

  - name: "less than or equal"
    mapping: |
      output.result = input.a <= input.b
    cases:
      - name: "true when less"
        input: {"a": 4, "b": 5}
        output: {"result": true}
      - name: "true when equal"
        input: {"a": 5, "b": 5}
        output: {"result": true}
      - name: "false when greater"
        input: {"a": 6, "b": 5}
        output: {"result": false}

  - name: "greater than or equal"
    mapping: |
      output.result = input.a >= input.b
    cases:
      - name: "true when greater"
        input: {"a": 10, "b": 5}
        output: {"result": true}
      - name: "true when equal"
        input: {"a": 5, "b": 5}
        output: {"result": true}
      - name: "false when less"
        input: {"a": 3, "b": 5}
        output: {"result": false}

  - name: "string comparison is lexicographic"
    mapping: |
      output.result = input.a < input.b
    cases:
      - name: "apple before banana"
        input: {"a": "apple", "b": "banana"}
        output: {"result": true}
      - name: "prefix is less than longer string"
        input: {"a": "abc", "b": "abcd"}
        output: {"result": true}
