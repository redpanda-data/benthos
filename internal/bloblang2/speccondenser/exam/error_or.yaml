description: "Or method and not_null — rescue null and void with defaults, not_null validation"

tests:
  - name: "or rescues null vs passes through present value"
    mapping: |
      output.result = input.name.or("anonymous")
    cases:
      - name: "null input field returns default"
        input: {}
        output: {"result": "anonymous"}
      - name: "present input field returned unchanged"
        input: {"name": "Alice"}
        output: {"result": "Alice"}

  - name: "or rescues void from if-without-else"
    mapping: |
      output.result = (if false { "hello" }).or("default")
    output: {"result": "default"}

  - name: "or rescues void from non-exhaustive match"
    mapping: |
      output.result = (match "bird" { "cat" => "meow" }).or("unknown")
    output: {"result": "unknown"}

  - name: "or does not trigger on zero"
    mapping: |
      output.result = 0.or(42)
    output: {"result": 0}

  - name: "or does not trigger on false"
    mapping: |
      output.result = false.or(true)
    output: {"result": false}

  - name: "or does not trigger on empty string"
    mapping: |
      output.result = "".or("fallback")
    output: {"result": ""}

  - name: "not_null with catch fallback on null"
    mapping: |
      output.result = null.not_null().catch(err -> "was null")
    output: {"result": "was null"}

  - name: "not_null passes through non-null value"
    mapping: |
      output.result = "hello".not_null()
    output: {"result": "hello"}

  - name: "not_null custom message accessible via catch"
    mapping: |
      output.result = null.not_null("name required").catch(err -> err.what)
    output: {"result": "name required"}

  - name: "or then not_null — or rescues null before not_null"
    mapping: |
      output.result = input.name.or("default").not_null()
    cases:
      - name: "missing field rescued by or"
        input: {}
        output: {"result": "default"}
      - name: "present field passes through both"
        input: {"name": "Bob"}
        output: {"result": "Bob"}
