description: "Copy-on-write semantics — output/input independence, variable independence"

tests:
  - name: "output = input then mutate output leaves input unchanged"
    input: {"name": "Alice", "score": 100}
    mapping: |
      output = input
      output.name = "Bob"
      output.original_name = input.name
    output: {"name": "Bob", "score": 100, "original_name": "Alice"}

  - name: "variable copy from input is independent"
    input: {"user": {"name": "Alice", "age": 30}}
    mapping: |
      $data = input.user
      $data.name = "Bob"
      output.var_name = $data.name
      output.input_name = input.user.name
    output: {"var_name": "Bob", "input_name": "Alice"}

  - name: "copy between variables is independent"
    mapping: |
      $a = {"x": 1}
      $b = $a
      $b.x = 2
      output.a = $a.x
      output.b = $b.x
    output: {"a": 1, "b": 2}

  - name: "multiple copies from same source are all independent"
    mapping: |
      $source = {"val": 0}
      $copy1 = $source
      $copy2 = $source
      $copy1.val = 1
      $copy2.val = 2
      output.source = $source.val
      output.c1 = $copy1.val
      output.c2 = $copy2.val
    output: {"source": 0, "c1": 1, "c2": 2}

  - name: "deeply nested mutation independent between variables"
    mapping: |
      $a = {"level1": {"level2": {"value": "original"}}}
      $b = $a
      $b.level1.level2.value = "modified"
      output.a_val = $a.level1.level2.value
      output.b_val = $b.level1.level2.value
    output: {"a_val": "original", "b_val": "modified"}

  - name: "array copy between variables is independent"
    mapping: |
      $a = [1, 2, 3]
      $b = $a
      $b[0] = 99
      output.a = $a
      output.b = $b
    output: {"a": [1, 2, 3], "b": [99, 2, 3]}

  - name: "variable snapshot of output is independent from later changes"
    mapping: |
      output.user.name = "Alice"
      $snap = output.user
      output.user.name = "Bob"
      output.snap_name = $snap.name
    output: {"user": {"name": "Bob"}, "snap_name": "Alice"}

  - name: "chain of copies are all independent"
    mapping: |
      $a = {"v": "a"}
      $b = $a
      $b.v = "b"
      $c = $b
      $c.v = "c"
      output.a = $a.v
      output.b = $b.v
      output.c = $c.v
    output: {"a": "a", "b": "b", "c": "c"}
