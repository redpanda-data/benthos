description: "Comparison, equality, logical operators, short-circuit evaluation, null equality"

tests:
  - name: "numeric comparison and boolean logic"
    mapping: |
      $in_range = input.val >= input.lo && input.val <= input.hi
      $is_special = input.val == 0 || input.val == 100
      output.in_range = $in_range
      output.is_special = $is_special
      output.allow = $in_range && !$is_special
    cases:
      - name: "in range and not special"
        input: {"val": 50, "lo": 0, "hi": 100}
        output: {"in_range": true, "is_special": false, "allow": true}
      - name: "at special boundary"
        input: {"val": 100, "lo": 0, "hi": 100}
        output: {"in_range": true, "is_special": true, "allow": false}
      - name: "out of range"
        input: {"val": -1, "lo": 0, "hi": 100}
        output: {"in_range": false, "is_special": false, "allow": false}

  - name: "string comparison is lexicographic"
    mapping: |
      output.gt = input.a > input.b
      output.eq = input.a == input.b
      output.lt = input.a < input.b
    cases:
      - name: "first is greater"
        input: {"a": "Zara", "b": "Alice"}
        output: {"gt": true, "eq": false, "lt": false}
      - name: "first is less"
        input: {"a": "Bob", "b": "Mike"}
        output: {"gt": false, "eq": false, "lt": true}

  - name: "cross-type equality and null"
    mapping: |
      output.num_promo = 5 == 5.0
      output.cross_type = "5" == 5
      output.null_eq = null == null
      output.null_ne = null != false
    output: {"num_promo": true, "cross_type": false, "null_eq": true, "null_ne": true}

  - name: "structural equality"
    mapping: |
      output.arr_eq = [1, 2, 3] == [1, 2, 3]
      output.arr_order = [1, 2] == [2, 1]
      output.obj_eq = {"a": 1, "b": 2} == {"b": 2, "a": 1}
    output: {"arr_eq": true, "arr_order": false, "obj_eq": true}
