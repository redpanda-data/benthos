description: "If expressions, if statements, match-boolean, match-equality, match-as, void semantics"

tests:
  - name: "classify with if and match"
    mapping: |
      $kind = match input.value as v {
        v > 100 => "big",
        v > 0 => "small",
        v == 0 => "zero",
        _ => "negative",
      }
      output.label = $kind
      output.doubled = if $kind == "big" {
        input.value * 2
      } else if $kind == "small" {
        input.value + 10
      } else {
        0
      }
      output.flag = match {
        input.value > 50 && input.tags.contains("priority") => "urgent",
        input.value > 50 => "notable",
        _ => "normal",
      }
    cases:
      - name: "big value with priority tag"
        input: {"value": 150, "tags": ["priority", "new"]}
        output: {"label": "big", "doubled": 300, "flag": "urgent"}
      - name: "small value"
        input: {"value": 25, "tags": ["routine"]}
        output: {"label": "small", "doubled": 35, "flag": "normal"}
      - name: "zero value"
        input: {"value": 0, "tags": []}
        output: {"label": "zero", "doubled": 0, "flag": "normal"}

  - name: "void from non-exhaustive match and if-without-else"
    mapping: |
      output.status = "pending"
      output.status = match input.code {
        "ok" => "approved",
        "err" => "rejected",
      }
      output.note = "original"
      output.note = if input.code == "ok" { "cleared" }
    cases:
      - name: "match hits and if true"
        input: {"code": "ok"}
        output: {"status": "approved", "note": "cleared"}
      - name: "match misses and if false — both void preserve"
        input: {"code": "unknown"}
        output: {"status": "pending", "note": "original"}
      - name: "match hits but if false — partial void"
        input: {"code": "err"}
        output: {"status": "rejected", "note": "original"}
