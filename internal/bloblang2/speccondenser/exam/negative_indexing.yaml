description: "Negative indexing — arrays and string slicing with negative indices"

tests:
  - name: "array negative indexing"
    mapping: |
      $arr = [10, 20, 30, 40, 50]
      output.v = $arr[input.idx]
    cases:
      - name: "-1 is last element"
        input: {"idx": -1}
        output: {"v": 50}
      - name: "-2 is second to last"
        input: {"idx": -2}
        output: {"v": 40}
      - name: "-3 is third to last"
        input: {"idx": -3}
        output: {"v": 30}

  - name: "array negative index on single element"
    mapping: |
      $arr = [42]
      output.v = $arr[-1]
    output: {"v": 42}

  - name: "negative index from input array"
    input: {"items": ["first", "middle", "last"]}
    mapping: |
      output.v = input.items[-1]
    output: {"v": "last"}

  - name: "string slicing with negative indices"
    mapping: |
      output = "hello world".slice(-5, -1)
    output: "worl"

  - name: "string slicing negative start to end"
    mapping: |
      output = "hello world".slice(-5)
    output: "world"

  - name: "array slicing with negative indices"
    mapping: |
      output = [10, 20, 30, 40, 50].slice(-3, -1)
    output: [30, 40]

  - name: "string negative index returns codepoint"
    mapping: |
      output.v = "hello"[-1].char()
    output: {"v": "o"}

  - name: "negative index assignment to variable array"
    mapping: |
      $arr = [10, 20, 30, 40]
      $arr[-1] = 99
      output.v = $arr
    output: {"v": [10, 20, 30, 99]}
