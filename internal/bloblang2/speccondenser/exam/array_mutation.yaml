description: "Array building methods: append, concat, without_index, enumerate"

tests:
  - name: "append adds element to end"
    mapping: |
      output.result = input.arr.append(input.elem)
    cases:
      - name: "append to array"
        input: {"arr": [1, 2, 3], "elem": 4}
        output: {"result": [1, 2, 3, 4]}
      - name: "append to empty"
        input: {"arr": [], "elem": "first"}
        output: {"result": ["first"]}
      - name: "append null"
        input: {"arr": [1, 2], "elem": null}
        output: {"result": [1, 2, null]}

  - name: "append does not modify original"
    mapping: |
      $arr = [1, 2]
      $new = $arr.append(3)
      output.original = $arr
      output.new = $new
    output: {"original": [1, 2], "new": [1, 2, 3]}

  - name: "concat joins two arrays"
    mapping: |
      output.result = input.a.concat(input.b)
    cases:
      - name: "basic concat"
        input: {"a": [1, 2], "b": [3, 4]}
        output: {"result": [1, 2, 3, 4]}
      - name: "concat with empty"
        input: {"a": [1, 2], "b": []}
        output: {"result": [1, 2]}
      - name: "both empty"
        input: {"a": [], "b": []}
        output: {"result": []}

  - name: "without_index removes element"
    mapping: |
      output.result = input.arr.without_index(input.idx)
    cases:
      - name: "remove middle"
        input: {"arr": [10, 20, 30], "idx": 1}
        output: {"result": [10, 30]}
      - name: "remove first"
        input: {"arr": [10, 20, 30], "idx": 0}
        output: {"result": [20, 30]}
      - name: "remove last with negative index"
        input: {"arr": [10, 20, 30], "idx": -1}
        output: {"result": [10, 20]}

  - name: "enumerate produces index-value pairs"
    mapping: |
      output.result = input.items.enumerate()
    cases:
      - name: "basic"
        input: {"items": ["a", "b", "c"]}
        output: {"result": [{"index": 0, "value": "a"}, {"index": 1, "value": "b"}, {"index": 2, "value": "c"}]}
      - name: "empty"
        input: {"items": []}
        output: {"result": []}
      - name: "single element"
        input: {"items": [42]}
        output: {"result": [{"index": 0, "value": 42}]}
