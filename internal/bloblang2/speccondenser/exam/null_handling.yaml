description: "Null behavior — null-safe chained access, null field access, or on null"

tests:
  - name: "null-safe chained access with ?."
    mapping: |
      output.v = input.user?.address?.city
    cases:
      - name: "all present"
        input: {"user": {"address": {"city": "London"}}}
        output: {"v": "London"}
      - name: "middle is null"
        input: {"user": {"address": null}}
        output: {"v": null}
      - name: "first is null"
        input: {"user": null}
        output: {"v": null}
      - name: "first is missing"
        input: {}
        output: {"v": null}

  - name: "null field access returns null not error"
    input: {"user": {"name": "Alice"}}
    mapping: |
      output.v = input.user.missing_field
    output: {"v": null}

  - name: "missing input field returns null"
    input: {}
    mapping: |
      output.v = input.nonexistent
    output: {"v": null}

  - name: "or on null input field provides default"
    mapping: |
      output.v = input.name.or("anonymous")
    cases:
      - name: "null returns default"
        input: {}
        output: {"v": "anonymous"}
      - name: "present returns value"
        input: {"name": "Alice"}
        output: {"v": "Alice"}

  - name: "null-safe bracket access on null"
    mapping: |
      $v = null
      output.v = $v?["key"]
    output: {"v": null}

  - name: "null-safe bracket access on array null"
    mapping: |
      $v = null
      output.v = $v?[0]
    output: {"v": null}

  - name: "null-safe method call on null"
    mapping: |
      $v = null
      output.v = $v?.length()
    output: {"v": null}

  - name: "null equality"
    mapping: |
      output.is_null = null == null
      output.not_null = "hello" == null
    output: {"is_null": true, "not_null": false}
