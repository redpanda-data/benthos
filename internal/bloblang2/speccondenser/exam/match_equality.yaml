description: "Match equality form: value compared with ==, wildcard, void from non-exhaustive"

tests:
  - name: "match equality on string value"
    mapping: |
      output.sound = match input.animal {
        "cat" => "meow",
        "dog" => "woof",
        _ => "unknown",
      }
    cases:
      - name: "cat"
        input: {"animal": "cat"}
        output: {"sound": "meow"}
      - name: "dog"
        input: {"animal": "dog"}
        output: {"sound": "woof"}
      - name: "wildcard"
        input: {"animal": "bird"}
        output: {"sound": "unknown"}

  - name: "match equality on integer value"
    mapping: |
      output.status = match input.code {
        200 => "ok",
        404 => "not found",
        500 => "error",
        _ => "other",
      }
    cases:
      - name: "200"
        input: {"code": 200}
        output: {"status": "ok"}
      - name: "404"
        input: {"code": 404}
        output: {"status": "not found"}
      - name: "unknown code"
        input: {"code": 301}
        output: {"status": "other"}

  - name: "match with case expression using variable"
    mapping: |
      $target = "hello"
      output.v = match "hello" {
        $target => "matched",
        _ => "no match",
      }
    output: {"v": "matched"}

  - name: "match with braced case body"
    input: {"currency": "USD", "amount": 42}
    mapping: |
      output.formatted = match input.currency {
        "USD" => {
          $symbol = "$"
          $symbol + input.amount.string()
        },
        "EUR" => {
          input.amount.string() + " EUR"
        },
        _ => input.currency + " " + input.amount.string(),
      }
    output: {"formatted": "$42"}

  - name: "non-exhaustive match produces void — preserves prior value"
    mapping: |
      output.sound = "default"
      output.sound = match "bird" {
        "cat" => "meow",
        "dog" => "woof",
      }
    output: {"sound": "default"}

  - name: "non-exhaustive match void leaves field absent"
    mapping: |
      output.sound = match "bird" {
        "cat" => "meow",
        "dog" => "woof",
      }
    output: {}
