description: "If as statement: output assignments, variable modification, else branches"

tests:
  - name: "if statement assigns to output"
    mapping: |
      if input.type == "user" {
        output.role = "member"
      }
    cases:
      - name: "true assigns"
        input: {"type": "user"}
        output: {"role": "member"}
      - name: "false skips"
        input: {"type": "guest"}
        output: {}

  - name: "if-else statement branch selection"
    mapping: |
      if input.type == "admin" {
        output.role = "admin"
      } else {
        output.role = "user"
      }
    cases:
      - name: "then branch"
        input: {"type": "admin"}
        output: {"role": "admin"}
      - name: "else branch"
        input: {"type": "guest"}
        output: {"role": "user"}

  - name: "else-if chain with output assignments"
    mapping: |
      if input.type == "admin" {
        output.role = "admin"
        output.level = 10
      } else if input.type == "mod" {
        output.role = "moderator"
        output.level = 5
      } else {
        output.role = "user"
        output.level = 1
      }
    cases:
      - name: "admin"
        input: {"type": "admin"}
        output: {"role": "admin", "level": 10}
      - name: "mod"
        input: {"type": "mod"}
        output: {"role": "moderator", "level": 5}
      - name: "fallback"
        input: {"type": "guest"}
        output: {"role": "user", "level": 1}

  - name: "if statement modifies outer variable"
    mapping: |
      $x = 10
      if input.flag {
        $x = 20
      }
      output.v = $x
    cases:
      - name: "modified when true"
        input: {"flag": true}
        output: {"v": 20}
      - name: "unchanged when false"
        input: {"flag": false}
        output: {"v": 10}

  - name: "if statement preserves prior output"
    mapping: |
      output.before = "exists"
      if true {
        output.added = "new"
      }
    output: {"before": "exists", "added": "new"}

  - name: "nested if statements"
    input: {"type": "admin", "active": true}
    mapping: |
      if input.type == "admin" {
        if input.active {
          output.status = "active admin"
        } else {
          output.status = "inactive admin"
        }
      }
    output: {"status": "active admin"}
