description: "Logical operators: &&, ||, !"

tests:
  - name: "logical AND"
    mapping: |
      output.result = input.a && input.b
    cases:
      - name: "both true"
        input: {"a": true, "b": true}
        output: {"result": true}
      - name: "first false"
        input: {"a": false, "b": true}
        output: {"result": false}
      - name: "second false"
        input: {"a": true, "b": false}
        output: {"result": false}
      - name: "both false"
        input: {"a": false, "b": false}
        output: {"result": false}

  - name: "logical OR"
    mapping: |
      output.result = input.a || input.b
    cases:
      - name: "both true"
        input: {"a": true, "b": true}
        output: {"result": true}
      - name: "first true"
        input: {"a": true, "b": false}
        output: {"result": true}
      - name: "second true"
        input: {"a": false, "b": true}
        output: {"result": true}
      - name: "both false"
        input: {"a": false, "b": false}
        output: {"result": false}

  - name: "logical NOT"
    mapping: |
      output.result = !input.v
    cases:
      - name: "not true"
        input: {"v": true}
        output: {"result": false}
      - name: "not false"
        input: {"v": false}
        output: {"result": true}

  - name: "AND short-circuits on false"
    mapping: |
      output.result = false && throw("should not be evaluated")
    output: {"result": false}

  - name: "OR short-circuits on true"
    mapping: |
      output.result = true || throw("should not be evaluated")
    output: {"result": true}

  - name: "AND binds tighter than OR"
    mapping: |
      output.a = true || false && false
      output.b = (true || false) && false
    output: {"a": true, "b": false}
