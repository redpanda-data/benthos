description: "Timestamp operations — constructor, formatting, parsing, arithmetic"

tests:
  - name: "timestamp constructor with year/month/day"
    mapping: |
      output = timestamp(2024, 6, 15).ts_format()
    output: "2024-06-15T00:00:00Z"

  - name: "timestamp constructor with full date and time"
    mapping: |
      output = timestamp(2024, 1, 15, 10, 30, 0).ts_format()
    output: "2024-01-15T10:30:00Z"

  - name: "timestamp constructor with fractional seconds"
    mapping: |
      output = timestamp(2024, 1, 15, 10, 30, 0, 500000000).ts_format()
    output: "2024-01-15T10:30:00.5Z"

  - name: "timestamp formatting with custom format"
    mapping: |
      output = timestamp(2024, 1, 15).ts_format("%Y-%m-%d")
    output: "2024-01-15"

  - name: "timestamp to unix epoch seconds"
    mapping: |
      output = timestamp(2024, 1, 15, 10, 30, 0).ts_unix()
    output: 1705314600

  - name: "timestamp add one hour"
    mapping: |
      output = timestamp(2024, 1, 15, 10, 30, 0).ts_add(hour()).ts_format()
    output: "2024-01-15T11:30:00Z"

  - name: "timestamp add 90 minutes"
    mapping: |
      output = timestamp(2024, 1, 15, 10, 30, 0).ts_add(90 * minute()).ts_format()
    output: "2024-01-15T12:00:00Z"

  - name: "timestamp subtract one day"
    mapping: |
      output = timestamp(2024, 1, 15, 10, 30, 0).ts_add(day() * -1).ts_format()
    output: "2024-01-14T10:30:00Z"

  - name: "timestamp parse RFC 3339 string"
    mapping: |
      output = "2024-06-01T12:00:00Z".ts_parse().ts_format()
    output: "2024-06-01T12:00:00Z"

  - name: "timestamp parse custom format"
    mapping: |
      output = "2024-03-20".ts_parse("%Y-%m-%d").ts_format()
    output: "2024-03-20T00:00:00Z"

  - name: "timestamp unix round-trip"
    mapping: |
      $ts = timestamp(2024, 1, 15, 10, 30, 0)
      output = $ts.ts_unix().ts_from_unix() == $ts
    output: true

  - name: "timestamp crosses leap day"
    mapping: |
      output = timestamp(2024, 2, 28, 12, 0, 0).ts_add(day()).ts_format()
    output: "2024-02-29T12:00:00Z"
