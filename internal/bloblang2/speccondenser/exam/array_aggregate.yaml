description: "Array aggregation methods: fold, sum, join, any, all, find"

tests:
  - name: "fold with accumulator"
    mapping: |
      output.result = input.items.fold(input.init, (acc, x) -> acc + x)
    cases:
      - name: "sum integers"
        input: {"items": [1, 2, 3, 4], "init": 0}
        output: {"result": 10}
      - name: "concatenate strings"
        input: {"items": ["a", "b", "c"], "init": ""}
        output: {"result": "abc"}
      - name: "empty array returns initial"
        input: {"items": [], "init": 42}
        output: {"result": 42}

  - name: "fold builds array"
    mapping: |
      output.result = [1, 2, 3].fold([], (acc, x) -> acc.append(x * 10))
    output: {"result": [10, 20, 30]}

  - name: "sum"
    mapping: |
      output.result = input.items.sum()
    cases:
      - name: "integers"
        input: {"items": [1, 2, 3, 4]}
        output: {"result": 10}
      - name: "floats"
        input: {"items": [1.5, 2.5, 3.0]}
        output: {"result": 7.0}
      - name: "empty array"
        input: {"items": []}
        output: {"result": 0}

  - name: "join strings"
    mapping: |
      output.result = input.items.join(input.delim)
    cases:
      - name: "with comma"
        input: {"items": ["a", "b", "c"], "delim": ", "}
        output: {"result": "a, b, c"}
      - name: "empty delimiter"
        input: {"items": ["a", "b", "c"], "delim": ""}
        output: {"result": "abc"}
      - name: "empty array"
        input: {"items": [], "delim": ", "}
        output: {"result": ""}

  - name: "any checks for at least one match"
    mapping: |
      output.result = input.items.any(x -> x > 3)
    cases:
      - name: "some match"
        input: {"items": [1, 2, 3, 4]}
        output: {"result": true}
      - name: "none match"
        input: {"items": [1, 2, 3]}
        output: {"result": false}
      - name: "empty array"
        input: {"items": []}
        output: {"result": false}

  - name: "all checks every element"
    mapping: |
      output.result = input.items.all(x -> x % 2 == 0)
    cases:
      - name: "all even"
        input: {"items": [2, 4, 6]}
        output: {"result": true}
      - name: "not all even"
        input: {"items": [2, 3, 6]}
        output: {"result": false}
      - name: "empty array vacuously true"
        input: {"items": []}
        output: {"result": true}

  - name: "find returns first match"
    mapping: |
      output.result = [1, 2, 3, 4].find(x -> x > 2)
    output: {"result": 3}

  - name: "find no match returns void (no assignment)"
    mapping: |
      output.result = [1, 2, 3].find(x -> x > 10)
    output: {}
