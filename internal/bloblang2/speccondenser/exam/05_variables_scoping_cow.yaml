description: "Variables, scoping (statement write-through vs expression shadowing), copy-on-write"

tests:
  - name: "statement write-through and expression shadowing"
    mapping: |
      $x = "original"
      if input.do_write {
        $x = "written"
      }
      output.after_stmt = $x
      output.from_expr = if true {
        $x = "shadowed"
        $x
      }
      output.after_expr = $x
    cases:
      - name: "write-through changes outer, shadow does not"
        input: {"do_write": true}
        output: {"after_stmt": "written", "from_expr": "shadowed", "after_expr": "written"}
      - name: "no write-through, shadow still isolated"
        input: {"do_write": false}
        output: {"after_stmt": "original", "from_expr": "shadowed", "after_expr": "original"}

  - name: "copy-on-write independence"
    mapping: |
      $src = {"val": input.start}
      $copy = $src
      $copy.val = "changed"
      output.src_val = $src.val
      output.copy_val = $copy.val
    cases:
      - name: "copies are independent"
        input: {"start": "original"}
        output: {"src_val": "original", "copy_val": "changed"}

  - name: "output = input copies whole document"
    mapping: |
      output = input
      output.extra = "added"
    cases:
      - name: "all input fields preserved plus new field"
        input: {"name": "Alice", "age": 30}
        output: {"name": "Alice", "age": 30, "extra": "added"}

  - name: "void skip on variable reassignment"
    mapping: |
      $v = 10
      $v = $v + 5
      $v = if false { 99 }
      output.v = $v
      output.type = $v.type()
    output: {"v": 15, "type": "int64"}

  - name: "auto-creation of nested paths"
    mapping: |
      $obj = {}
      $obj.a.b.c = "deep"
      output.deep = $obj.a.b.c
      output.parent = $obj.a.b
    output: {"deep": "deep", "parent": {"c": "deep"}}
