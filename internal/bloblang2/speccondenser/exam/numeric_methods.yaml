description: "Numeric methods: abs, floor, ceil, round"

tests:
  - name: "abs returns absolute value"
    mapping: |
      output.v = input.val.abs()
    cases:
      - name: "positive unchanged"
        input: {"val": 7}
        output: {"v": 7}
      - name: "negative becomes positive"
        input: {"val": -7}
        output: {"v": 7}
      - name: "zero unchanged"
        input: {"val": 0}
        output: {"v": 0}

  - name: "abs on floats"
    mapping: |
      output.v = input.val.abs()
    cases:
      - name: "negative float"
        input: {"val": -3.14}
        output: {"v": 3.14}
      - name: "positive float unchanged"
        input: {"val": 2.5}
        output: {"v": 2.5}

  - name: "floor rounds toward negative infinity"
    mapping: |
      output.v = input.val.floor()
    cases:
      - name: "positive fractional"
        input: {"val": 3.7}
        output: {"v": 3.0}
      - name: "negative fractional"
        input: {"val": -3.2}
        output: {"v": -4.0}
      - name: "already whole"
        input: {"val": 5.0}
        output: {"v": 5.0}

  - name: "ceil rounds toward positive infinity"
    mapping: |
      output.v = input.val.ceil()
    cases:
      - name: "positive fractional"
        input: {"val": 3.2}
        output: {"v": 4.0}
      - name: "negative fractional"
        input: {"val": -3.7}
        output: {"v": -3.0}
      - name: "already whole"
        input: {"val": 5.0}
        output: {"v": 5.0}

  - name: "round defaults to zero decimal places (half-even)"
    mapping: |
      output.v = input.val.round()
    cases:
      - name: "rounds up"
        input: {"val": 3.7}
        output: {"v": 4.0}
      - name: "rounds down"
        input: {"val": 3.2}
        output: {"v": 3.0}
      - name: "half-even rounds 2.5 to 2"
        input: {"val": 2.5}
        output: {"v": 2.0}
      - name: "half-even rounds 3.5 to 4"
        input: {"val": 3.5}
        output: {"v": 4.0}

  - name: "round with decimal places"
    mapping: |
      output.v = input.val.round(2)
    cases:
      - name: "two decimal places"
        input: {"val": 3.456}
        output: {"v": 3.46}
      - name: "no rounding needed"
        input: {"val": 1.12}
        output: {"v": 1.12}
