description: "Input/output access patterns: reading fields, root assignment, metadata"

tests:
  - name: "read input fields and nested access"
    input: {"user": {"name": "Alice", "address": {"city": "London"}}}
    mapping: |
      output.name = input.user.name
      output.city = input.user.address.city
    output: {"name": "Alice", "city": "London"}

  - name: "input array element access"
    input: {"items": ["apple", "banana", "cherry"]}
    mapping: |
      output.first = input.items[0]
      output.last = input.items[2]
    output: {"first": "apple", "last": "cherry"}

  - name: "non-existent input field returns null"
    input: {"name": "Alice"}
    mapping: |
      output.v = input.missing
    output: {"v": null}

  - name: "root assignment copies input then extends"
    input: {"name": "Alice", "score": 100}
    mapping: |
      output = input
      output.greeting = "Hello, " + input.name
    output: {"name": "Alice", "score": 100, "greeting": "Hello, Alice"}

  - name: "root assignment is COW — input unchanged"
    input: {"name": "Alice", "age": 30}
    mapping: |
      output = input
      output.name = "Bob"
      output.original = input.name
    output: {"name": "Bob", "age": 30, "original": "Alice"}

  - name: "read input metadata"
    input: {"data": 1}
    input_metadata: {"source": "kafka", "topic": "events"}
    mapping: |
      output.source = input@.source
      output.all_meta = input@
    output: {"source": "kafka", "all_meta": {"source": "kafka", "topic": "events"}}

  - name: "write output metadata"
    input: {}
    input_metadata: {"trace_id": "abc-123"}
    mapping: |
      output@.trace_id = input@.trace_id
      output@.processed = true
    output: {}
    output_metadata: {"trace_id": "abc-123", "processed": true}

  - name: "copy all metadata from input then extend"
    input: {}
    input_metadata: {"source": "kafka"}
    mapping: |
      output@ = input@
      output@.enriched = true
    output: {}
    output_metadata: {"source": "kafka", "enriched": true}
