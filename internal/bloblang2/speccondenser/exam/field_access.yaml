description: "Dynamic and null-safe field access, quoted fields"

tests:
  - name: "dynamic field access with variable key"
    mapping: |
      $key = "color"
      output.v = input[$key]
    cases:
      - name: "key present"
        input: {"color": "blue"}
        output: {"v": "blue"}
      - name: "key missing returns null"
        input: {"size": "large"}
        output: {"v": null}

  - name: "dynamic access with computed key"
    input: {"item_a": "found"}
    mapping: |
      $suffix = "a"
      output.v = input["item_" + $suffix]
    output: {"v": "found"}

  - name: "null-safe field access"
    mapping: |
      output.v = input.user?.name
    cases:
      - name: "present"
        input: {"user": {"name": "Alice"}}
        output: {"v": "Alice"}
      - name: "user is null"
        input: {"user": null}
        output: {"v": null}
      - name: "user missing"
        input: {}
        output: {"v": null}

  - name: "chained null-safe access"
    mapping: |
      output.v = input.user?.address?.city
    cases:
      - name: "all present"
        input: {"user": {"address": {"city": "London"}}}
        output: {"v": "London"}
      - name: "middle null"
        input: {"user": {"address": null}}
        output: {"v": null}
      - name: "first null"
        input: {"user": null}
        output: {"v": null}

  - name: "quoted field names for special characters"
    input: {"special-key": "works", "a.b.c": "dotted"}
    mapping: |
      output.special = input."special-key"
      output.dotted = input."a.b.c"
    output: {"special": "works", "dotted": "dotted"}

  - name: "quoted field with nested access"
    input: {"top level": {"inner-key": "found"}}
    mapping: |
      output.v = input."top level"."inner-key"
    output: {"v": "found"}
