description: "Sequence methods shared by strings and arrays: length, contains, slice, reverse"

tests:
  - name: "length on different types"
    mapping: |
      output.result = input.v.length()
    cases:
      - name: "string"
        input: {"v": "hello"}
        output: {"result": 5}
      - name: "empty string"
        input: {"v": ""}
        output: {"result": 0}
      - name: "array"
        input: {"v": [1, 2, 3]}
        output: {"result": 3}
      - name: "empty array"
        input: {"v": []}
        output: {"result": 0}

  - name: "contains on strings"
    mapping: |
      output.result = input.v.contains(input.sub)
    cases:
      - name: "found"
        input: {"v": "hello world", "sub": "world"}
        output: {"result": true}
      - name: "not found"
        input: {"v": "hello world", "sub": "xyz"}
        output: {"result": false}
      - name: "empty substring always matches"
        input: {"v": "hello", "sub": ""}
        output: {"result": true}

  - name: "contains on arrays"
    mapping: |
      output.result = input.v.contains(input.elem)
    cases:
      - name: "found"
        input: {"v": [1, 2, 3], "elem": 2}
        output: {"result": true}
      - name: "not found"
        input: {"v": [1, 2, 3], "elem": 5}
        output: {"result": false}
      - name: "contains null"
        input: {"v": [1, null, 3], "elem": null}
        output: {"result": true}

  - name: "slice on strings"
    mapping: |
      output.result = input.v.slice(input.low, input.high)
    cases:
      - name: "basic slice"
        input: {"v": "hello world", "low": 0, "high": 5}
        output: {"result": "hello"}
      - name: "middle slice"
        input: {"v": "hello world", "low": 6, "high": 11}
        output: {"result": "world"}

  - name: "slice on arrays"
    mapping: |
      output.result = input.v.slice(input.low, input.high)
    cases:
      - name: "basic slice"
        input: {"v": [10, 20, 30, 40, 50], "low": 1, "high": 4}
        output: {"result": [20, 30, 40]}
      - name: "negative indices"
        input: {"v": [10, 20, 30, 40, 50], "low": -3, "high": -1}
        output: {"result": [30, 40]}

  - name: "reverse"
    mapping: |
      output.str = "hello".reverse()
      output.arr = [1, 2, 3].reverse()
    output: {"str": "olleh", "arr": [3, 2, 1]}
