description: "Object methods: keys, values, has_key, merge, without, map_entries, filter_entries"

tests:
  - name: "keys returns sorted key list"
    mapping: |
      output.result = input.obj.keys().sort()
    cases:
      - name: "multiple keys"
        input: {"obj": {"c": 3, "a": 1, "b": 2}}
        output: {"result": ["a", "b", "c"]}
      - name: "empty object"
        input: {"obj": {}}
        output: {"result": []}

  - name: "values returns sorted value list"
    mapping: |
      output.result = input.obj.values().sort()
    cases:
      - name: "multiple values"
        input: {"obj": {"c": 3, "a": 1, "b": 2}}
        output: {"result": [1, 2, 3]}
      - name: "empty object"
        input: {"obj": {}}
        output: {"result": []}

  - name: "has_key"
    mapping: |
      output.result = input.obj.has_key(input.key)
    cases:
      - name: "key exists"
        input: {"obj": {"name": "Alice"}, "key": "name"}
        output: {"result": true}
      - name: "key missing"
        input: {"obj": {"name": "Alice"}, "key": "age"}
        output: {"result": false}
      - name: "empty object"
        input: {"obj": {}, "key": "anything"}
        output: {"result": false}
      - name: "null value still counts"
        input: {"obj": {"x": null}, "key": "x"}
        output: {"result": true}

  - name: "merge two objects"
    mapping: |
      output.result = input.a.merge(input.b)
    cases:
      - name: "disjoint keys"
        input: {"a": {"x": 1}, "b": {"y": 2}}
        output: {"result": {"x": 1, "y": 2}}
      - name: "right wins on conflict"
        input: {"a": {"x": 1, "y": 2}, "b": {"y": 99, "z": 3}}
        output: {"result": {"x": 1, "y": 99, "z": 3}}
      - name: "merge with empty"
        input: {"a": {"x": 1}, "b": {}}
        output: {"result": {"x": 1}}

  - name: "without removes specified keys"
    mapping: |
      output.result = input.obj.without(input.keys)
    cases:
      - name: "remove one key"
        input: {"obj": {"a": 1, "b": 2, "c": 3}, "keys": ["b"]}
        output: {"result": {"a": 1, "c": 3}}
      - name: "remove multiple keys"
        input: {"obj": {"a": 1, "b": 2, "c": 3}, "keys": ["a", "c"]}
        output: {"result": {"b": 2}}
      - name: "remove all keys"
        input: {"obj": {"a": 1, "b": 2}, "keys": ["a", "b"]}
        output: {"result": {}}

  - name: "map_entries transforms keys and values"
    mapping: |
      output.result = {"a": 1, "b": 2}.map_entries((k, v) -> {"key": k.uppercase(), "value": v * 10})
    output: {"result": {"A": 10, "B": 20}}

  - name: "map_entries swap keys and values"
    mapping: |
      output.result = {"x": "alpha", "y": "beta"}.map_entries((k, v) -> {"key": v, "value": k})
    output: {"result": {"alpha": "x", "beta": "y"}}

  - name: "filter_entries keeps matching entries"
    mapping: |
      output.result = input.obj.filter_entries((k, v) -> v > 2)
    cases:
      - name: "some match"
        input: {"obj": {"a": 1, "b": 5, "c": 3}}
        output: {"result": {"b": 5, "c": 3}}
      - name: "none match"
        input: {"obj": {"a": 1, "b": 2}}
        output: {"result": {}}
      - name: "all match"
        input: {"obj": {"a": 10, "b": 20}}
        output: {"result": {"a": 10, "b": 20}}

  - name: "filter_entries by key"
    mapping: |
      output.result = {"name": "Alice", "age": 30, "note": "test"}.filter_entries((k, v) -> k.has_prefix("n"))
    output: {"result": {"name": "Alice", "note": "test"}}
