description: "Lambda expressions: single/multi param, block bodies, outer variable capture"

tests:
  - name: "single-param lambda in map"
    mapping: |
      output.result = [1, 2, 3].map(x -> x * 2)
    output: {"result": [2, 4, 6]}

  - name: "single-param lambda in filter"
    mapping: |
      output.result = [1, 2, 3, 4, 5].filter(x -> x > 3)
    output: {"result": [4, 5]}

  - name: "single-param lambda with method call"
    mapping: |
      output.result = ["hello", "world"].map(s -> s.uppercase())
    output: {"result": ["HELLO", "WORLD"]}

  - name: "multi-param lambda in fold"
    mapping: |
      output.sum = [1, 2, 3, 4].fold(0, (tally, x) -> tally + x)
    output: {"sum": 10}

  - name: "multi-param lambda in map_entries"
    mapping: |
      output.result = {"a": 1, "b": 2}.map_entries((k, v) -> {"key": k.uppercase(), "value": v * 10})
    output: {"result": {"A": 10, "B": 20}}

  - name: "block body lambda with local variables"
    mapping: |
      $items = [{"price": 10, "qty": 3}, {"price": 20, "qty": 1}]
      output.result = $items.map(item -> {
        $base = item.price * item.qty
        $tax = $base * 0.1
        $base + $tax
      })
    output: {"result": [33.0, 22.0]}

  - name: "block body lambda with conditional"
    mapping: |
      output.result = [1, 2, 3, 4].map(x -> {
        $label = if x > 2 { "big" } else { "small" }
        $label + ":" + x.string()
      })
    output: {"result": ["small:1", "small:2", "big:3", "big:4"]}

  - name: "lambda capturing outer variable (read-only)"
    mapping: |
      $factor = 10
      output.v = [1, 2, 3].map(x -> x * $factor)
    output: {"v": [10, 20, 30]}

  - name: "lambda captures outer — outer unchanged after execution"
    mapping: |
      $x = "outer"
      output.result = [1, 2, 3].map(n -> {
        $x = n * 10
        $x
      })
      output.outer = $x
    output: {"result": [10, 20, 30], "outer": "outer"}

  - name: "chained iterators both capture outer variable"
    mapping: |
      $min = 2
      $scale = 10
      output.v = [1, 2, 3, 4, 5]
        .filter(x -> x >= $min)
        .map(x -> x * $scale)
    output: {"v": [20, 30, 40, 50]}

  - name: "nested lambdas"
    mapping: |
      $matrix = [[1, 2], [3, 4]]
      output.result = $matrix.map(row -> row.map(x -> x * 10))
    output: {"result": [[10, 20], [30, 40]]}

  - name: "pass map name to higher-order method"
    mapping: |
      map double(x) { x * 2 }
      output.result = [1, 2, 3].map(double)
    output: {"result": [2, 4, 6]}
