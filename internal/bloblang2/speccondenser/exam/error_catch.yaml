description: "Error catching with .catch() — intercept errors, access error messages, throw and catch"

tests:
  - name: "catch division by zero with fallback"
    mapping: |
      output.result = (10 / 0).catch(err -> -1)
    output: {"result": -1}

  - name: "catch accesses error message via err.what"
    mapping: |
      output.msg = (10 / 0).catch(err -> err.what)
    output: {"msg": "division by zero"}

  - name: "catch thrown error with custom message"
    mapping: |
      output.result = throw("bad input").catch(err -> "recovered: " + err.what)
    output: {"result": "recovered: bad input"}

  - name: "catch returns value unchanged when no error"
    mapping: |
      output.result = "all good".catch(err -> "fallback")
    output: {"result": "all good"}

  - name: "catch chain — first catch handles, second not invoked"
    mapping: |
      output.result = throw("x").catch(err -> "first").catch(err -> "second")
    output: {"result": "first"}

  - name: "catch chain — first re-throws, second handles"
    mapping: |
      output.result = throw("a").catch(err -> throw("b")).catch(err -> err.what)
    output: {"result": "b"}

  - name: "catch on method chain catches entire chain"
    mapping: |
      output.result = "hello".int64().abs().catch(err -> -1)
    output: {"result": -1}

  - name: "catch scoped by parentheses"
    mapping: |
      output.result = ((10 / 0).catch(err -> 42)).string()
    output: {"result": "42"}

  - name: "catch with computation in handler"
    mapping: |
      $default = 100
      output.result = (10 / 0).catch(err -> $default * 2)
    output: {"result": 200}
