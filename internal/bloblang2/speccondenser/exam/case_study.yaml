description: >
  Realistic e-commerce order transformation — renames fields, computes totals,
  filters items, formats strings. Combines maps, lambdas, conditionals, and
  method chaining.

tests:
  - name: "transform e-commerce order"
    mapping: |
      map format_currency(amount, currency) {
        currency + " " + amount.round(2).string()
      }

      $items = input.order.items.map(item -> {
        $qty = item.quantity
        $price = item.unit_price
        $line_total = ($qty * $price).round(2)
        {
          "sku": item.sku,
          "name": item.name.uppercase(),
          "quantity": $qty,
          "unit_price": $price,
          "line_total": $line_total,
          "in_stock": item.stock > 0,
        }
      })

      $in_stock_items = $items.filter(i -> i.in_stock)
      $subtotal = $in_stock_items.map(i -> i.line_total).sum().round(2)
      $tax = ($subtotal * input.tax_rate).round(2)
      $total = ($subtotal + $tax).round(2)

      output.order_id = input.order.id.string()
      output.customer = input.order.customer.first_name + " " + input.order.customer.last_name
      output.email = input.order.customer.email.lowercase()
      output.item_count = $in_stock_items.length()
      output.items = $in_stock_items
      output.subtotal = format_currency($subtotal, input.order.currency)
      output.tax = format_currency($tax, input.order.currency)
      output.total = format_currency($total, input.order.currency)
      output.has_out_of_stock = $items.any(i -> !i.in_stock)
      output.notes = input.order.notes.or("No notes provided")
    cases:
      - name: "standard order with mixed stock"
        input:
          tax_rate: 0.1
          order:
            id: 12345
            currency: "USD"
            notes: "Please gift wrap"
            customer:
              first_name: "Jane"
              last_name: "Doe"
              email: "JANE.DOE@EXAMPLE.COM"
            items:
              - sku: "WIDGET-A"
                name: "Deluxe Widget"
                quantity: 2
                unit_price: 29.99
                stock: 10
              - sku: "GADGET-B"
                name: "Mini Gadget"
                quantity: 1
                unit_price: 14.50
                stock: 0
              - sku: "GIZMO-C"
                name: "Super Gizmo"
                quantity: 3
                unit_price: 9.99
                stock: 5
        output:
          order_id: "12345"
          customer: "Jane Doe"
          email: "jane.doe@example.com"
          item_count: 2
          items:
            - sku: "WIDGET-A"
              name: "DELUXE WIDGET"
              quantity: 2
              unit_price: 29.99
              line_total: 59.98
              in_stock: true
            - sku: "GIZMO-C"
              name: "SUPER GIZMO"
              quantity: 3
              unit_price: 9.99
              line_total: 29.97
              in_stock: true
          subtotal: "USD 89.95"
          tax: "USD 9.0"
          total: "USD 98.95"
          has_out_of_stock: true
          notes: "Please gift wrap"

      - name: "order with no notes and all items in stock"
        input:
          tax_rate: 0.0
          order:
            id: 67890
            currency: "EUR"
            customer:
              first_name: "Bob"
              last_name: "Smith"
              email: "Bob@Test.COM"
            items:
              - sku: "BOOK-1"
                name: "Go Programming"
                quantity: 1
                unit_price: 45.00
                stock: 3
        output:
          order_id: "67890"
          customer: "Bob Smith"
          email: "bob@test.com"
          item_count: 1
          items:
            - sku: "BOOK-1"
              name: "GO PROGRAMMING"
              quantity: 1
              unit_price: 45.0
              line_total: 45.0
              in_stock: true
          subtotal: "EUR 45.0"
          tax: "EUR 0.0"
          total: "EUR 45.0"
          has_out_of_stock: false
          notes: "No notes provided"
