description: "String regex methods: re_match, re_find_all, re_replace_all"

tests:
  - name: "re_match"
    mapping: |
      output.result = input.v.re_match(input.pattern)
    cases:
      - name: "simple match"
        input: {"v": "hello world", "pattern": "world"}
        output: {"result": true}
      - name: "no match"
        input: {"v": "hello world", "pattern": "xyz"}
        output: {"result": false}
      - name: "anchored start"
        input: {"v": "hello world", "pattern": "^hello"}
        output: {"result": true}
      - name: "digit pattern"
        input: {"v": "abc123", "pattern": "[0-9]+"}
        output: {"result": true}

  - name: "re_find_all"
    mapping: |
      output.result = input.v.re_find_all(input.pattern)
    cases:
      - name: "multiple matches"
        input: {"v": "cat bat rat", "pattern": "[a-z]at"}
        output: {"result": ["cat", "bat", "rat"]}
      - name: "no matches"
        input: {"v": "hello world", "pattern": "[0-9]+"}
        output: {"result": []}
      - name: "extract digits"
        input: {"v": "a1b22c333", "pattern": "[0-9]+"}
        output: {"result": ["1", "22", "333"]}

  - name: "re_replace_all with pattern"
    mapping: |
      output.result = input.v.re_replace_all(input.pattern, input.replacement)
    cases:
      - name: "replace digits"
        input: {"v": "abc123def456", "pattern": "[0-9]+", "replacement": "NUM"}
        output: {"result": "abcNUMdefNUM"}
      - name: "remove matches"
        input: {"v": "a1b2c3", "pattern": "[0-9]", "replacement": ""}
        output: {"result": "abc"}
      - name: "no match unchanged"
        input: {"v": "hello", "pattern": "[0-9]+", "replacement": "X"}
        output: {"result": "hello"}

  - name: "re_replace_all with capture group"
    mapping: |
      output.result = "2024-03-01".re_replace_all("([0-9]{4})-([0-9]{2})-([0-9]{2})", "$2/$3/$1")
    output: {"result": "03/01/2024"}

  - name: "re_replace_all backreference $0"
    mapping: |
      output.result = "hello world".re_replace_all("[a-z]+", "[$0]")
    output: {"result": "[hello] [world]"}
