description: >
  .enumerate() method — returns array of {index, value} objects.
  Also tests .without_index(), .sum(), .min(), .max(), .join() basics.

tests:
  # --- enumerate (V1: enumerated) ---

  - name: "enumerate basic"
    mapping: |
      root.v = ["a", "b", "c"].enumerated()
    output: {"v": [{"index": 0, "value": "a"}, {"index": 1, "value": "b"}, {"index": 2, "value": "c"}]}

  - name: "enumerate empty array"
    mapping: |
      root.v = [].enumerated()
    output: {"v": []}

  - name: "enumerate single element"
    mapping: |
      root.v = [42].enumerated()
    output: {"v": [{"index": 0, "value": 42}]}

  - name: "enumerate then map to transform with index"
    mapping: |
      root.v = ["a", "b"].enumerated().map_each(e -> e.index.string() + ":" + e.value)
    output: {"v": ["0:a", "1:b"]}

  # --- without_index ---

  - name: "without_index removes element at index"
    skip: "V1 has no equivalent for without_index"

  - name: "without_index first element"
    skip: "V1 has no equivalent for without_index"

  - name: "without_index last element"
    skip: "V1 has no equivalent for without_index"

  - name: "without_index out of bounds is error"
    skip: "V1 has no equivalent for without_index"

  # --- join ---

  - name: "join array of strings"
    mapping: |
      root.v = ["a", "b", "c"].join(",")
    output: {"v": "a,b,c"}

  - name: "join with empty separator"
    mapping: |
      root.v = ["a", "b", "c"].join("")
    output: {"v": "abc"}

  - name: "join empty array"
    mapping: |
      root.v = [].join(",")
    output: {"v": ""}

  - name: "join single element"
    mapping: |
      root.v = ["only"].join(",")
    output: {"v": "only"}

  - name: "join with non-string element is error"
    mapping: |
      root.v = ["a", 1, "b"].join(",")
    error: "string"

  # --- sum ---

  - name: "sum of integers"
    mapping: |
      root.v = [1, 2, 3, 4].sum()
    output: {"v": 10.0}

  - name: "sum of floats"
    mapping: |
      root.v = [1.5, 2.5, 3.0].sum()
    output: {"v": 7.0}

  - name: "sum of empty array returns zero"
    mapping: |
      root.v = [].sum()
    output: {"v": 0.0}

  - name: "sum of single element"
    mapping: |
      root.v = [42].sum()
    output: {"v": 42.0}

  # --- min / max (V1 min/max are numeric-only and return float64) ---

  - name: "min of integers"
    mapping: |
      root.v = [3, 1, 4, 1, 5].min()
    output: {"v": 1.0}

  - name: "max of integers"
    mapping: |
      root.v = [3, 1, 4, 1, 5].max()
    output: {"v": 5.0}

  - name: "min of strings"
    mapping: |
      root.v = ["banana", "apple", "cherry"].min()
    error: "number"

  - name: "max of strings"
    mapping: |
      root.v = ["banana", "apple", "cherry"].max()
    error: "number"

  - name: "min of empty array is error"
    mapping: |
      root.v = [].min()
    error: "empty"

  - name: "max of empty array is error"
    mapping: |
      root.v = [].max()
    error: "empty"

  - name: "min of single element"
    mapping: |
      root.v = [42].min()
    output: {"v": 42.0}

  - name: "max of single element"
    mapping: |
      root.v = [42].max()
    output: {"v": 42.0}
