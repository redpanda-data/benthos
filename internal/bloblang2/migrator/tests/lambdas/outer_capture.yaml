description: >
  Lambda capture of outer variables — lambdas reading variables from enclosing
  scopes, including nested lambdas and lambdas inside maps.

tests:
  # --- Simple outer variable capture ---

  - name: "lambda reads single outer variable"
    mapping: |
      let factor = 10
      root.v = [1, 2, 3].map_each(x -> x * $factor)
    output: {"v": [10, 20, 30]}

  - name: "lambda reads multiple outer variables"
    mapping: |
      let offset = 100
      let scale = 3
      root.v = [1, 2].map_each(x -> x * $scale + $offset)
    output: {"v": [103, 106]}

  - name: "lambda reads outer variable in filter condition"
    mapping: |
      let threshold = 5
      root.v = [1, 3, 7, 9, 2].filter(x -> x > $threshold)
    output: {"v": [7, 9]}

  - name: "lambda reads outer variable in fold"
    mapping: |
      let base = 100
      root.v = [1, 2, 3].fold($base, item -> item.tally + item.value)
    output: {"v": 106}

  # --- Nested lambda capture ---

  - name: "inner lambda captures outer lambda parameter"
    mapping: |
      root.v = [1, 2].map_each(x -> [10, 20].map_each(y -> x * 100 + y))
    output: {"v": [[110, 120], [210, 220]]}

  - name: "inner lambda captures top-level variable through outer lambda"
    mapping: |
      let prefix = "item"
      root.v = [1, 2].map_each(x -> $prefix + "_" + x.string())
    output: {"v": ["item_1", "item_2"]}

  - name: "triple nested lambda captures all levels"
    mapping: |
      let base = 1000
      root.v = [1].map_each(a -> [2].map_each(b -> [3].map_each(c -> $base + a * 100 + b * 10 + c)))
    output: {"v": [[[1123]]]}

  # --- Capture with shadowing ---

  - name: "lambda parameter does not modify outer variable"
    mapping: |
      let x = "outer"
      let result = ["inner"].map_each(x -> x + "_mapped")
      root.outer = $x
      root.mapped = $result
    output:
      outer: "outer"
      mapped: ["inner_mapped"]

  - name: "lambda local variable does not modify outer variable"
    # V1 has no block-body lambdas and `let` inside lambda body is not a thing.
    # Additionally, V1 `let` has no block scope — an inline let would leak anyway.
    skip: "V1 lambda bodies are single expressions — no inline let statements; V1 let has no block scope regardless"

  # --- Capture across iterator chains ---

  - name: "chained iterators both capture outer variable"
    # V1 parser rejects a newline immediately before `.` — break *after* the dot instead.
    mapping: |
      let min = 2
      let scale = 10
      root.v = [1, 2, 3, 4, 5].
        filter(x -> x >= $min).
        map_each(x -> x * $scale)
    output: {"v": [20, 30, 40, 50]}

  - name: "sort_by with outer variable in key function"
    # V1 has no bracket indexing: `x[$field]` is a parse error (§6.2). Use .get($field) instead.
    mapping: |
      let field = "priority"
      let items = [
        {"name": "c", "priority": 3},
        {"name": "a", "priority": 1},
        {"name": "b", "priority": 2}
      ]
      root.v = $items.sort_by(x -> x.get($field)).map_each(x -> x.name)
    output: {"v": ["a", "b", "c"]}
