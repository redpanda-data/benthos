description: "Array literals, indexing, nesting, trailing commas, and methods"

tests:
  # --- Literals ---

  - name: "empty array literal"
    mapping: |
      root.arr = []
    output: {"arr": []}

  - name: "single element array"
    mapping: |
      root.arr = [42]
    output: {"arr": [42]}

  - name: "multi-element array"
    mapping: |
      root.arr = [1, 2, 3]
    output: {"arr": [1, 2, 3]}

  - name: "mixed type array"
    mapping: |
      root.arr = [1, "two", true, null, 3.14]
    output: {"arr": [1, "two", true, null, 3.14]}

  - name: "trailing comma allowed"
    mapping: |
      root.arr = [1, 2, 3,]
    output: {"arr": [1, 2, 3]}

  - name: "nested arrays"
    mapping: |
      root.arr = [[1, 2], [3, 4]]
    output: {"arr": [[1, 2], [3, 4]]}

  - name: "array with expressions"
    mapping: |
      let x = 10
      root.arr = [$x, $x + 1, $x * 2]
    output: {"arr": [10, 11, 20]}

  - name: "deeply nested arrays"
    mapping: |
      root.arr = [[[1]]]
    output: {"arr": [[[1]]]}

  # --- Indexing ---

  - name: "index first element"
    mapping: |
      let arr = [10, 20, 30]
      root.v = $arr.index(0)
    output: {"v": 10}

  - name: "index last element positive"
    mapping: |
      let arr = [10, 20, 30]
      root.v = $arr.index(2)
    output: {"v": 30}

  - name: "negative index last element"
    mapping: |
      let arr = [10, 20, 30]
      root.v = $arr.index(-1)
    output: {"v": 30}

  - name: "negative index second to last"
    mapping: |
      let arr = [10, 20, 30]
      root.v = $arr.index(-2)
    output: {"v": 20}

  - name: "negative index first element"
    mapping: |
      let arr = [10, 20, 30]
      root.v = $arr.index(-3)
    output: {"v": 10}

  - name: "out of bounds positive index"
    mapping: |
      let arr = [10, 20, 30]
      root.v = $arr.index(3)
    # FIXME-v1: verify runtime output — V1 `.index()` returns null on OOB, not an error
    skip: "V1 .index() out-of-range returns null, not an error"

  - name: "out of bounds negative index"
    mapping: |
      let arr = [10, 20, 30]
      root.v = $arr.index(-4)
    skip: "V1 .index() out-of-range returns null, not an error"

  - name: "index empty array"
    mapping: |
      let arr = []
      root.v = $arr.index(0)
    skip: "V1 .index() out-of-range returns null, not an error"

  - name: "index with float whole number accepted"
    mapping: |
      let arr = [10, 20, 30]
      root.v = $arr.index(2.0)
    # FIXME-v1: verify — V1 ParamInt64 coercion accepts whole floats
    output: {"v": 30}

  - name: "index with non-whole float is error"
    # V1 `.index()` coerces non-whole floats to int (1.5 → 1); it does not reject them.
    mapping: |
      let arr = [10, 20, 30]
      root.v = $arr.index(1.5)
    output: {"v": 20}

  - name: "index with string is error"
    # V1 rejects a string argument to `.index()` at compile time (literal-type check).
    mapping: |
      let arr = [10, 20, 30]
      root.v = $arr.index("0")
    compile_error: "expected number value"

  - name: "nested array indexing"
    mapping: |
      let arr = [[1, 2], [3, 4]]
      root.v = $arr.index(1).index(0)
    output: {"v": 3}

  # --- Length ---

  - name: "length of empty array"
    mapping: |
      root.len = [].length()
    output: {"len": 0}

  - name: "length of non-empty array"
    mapping: |
      root.len = [1, 2, 3].length()
    output: {"len": 3}

  # --- Type ---

  - name: "array type"
    mapping: |
      root.t = [1, 2, 3].type()
    output: {"t": "array"}

  - name: "empty array type"
    mapping: |
      root.t = [].type()
    output: {"t": "array"}

  # --- Array from input ---

  - name: "array from input field"
    input: {"items": [10, 20, 30]}
    mapping: |
      root.first = this.items.index(0)
      root.last = this.items.index(-1)
      root.len = this.items.length()
    output: {"first": 10, "last": 30, "len": 3}

  # --- Deleted in array literal ---

  - name: "deleted in array literal removes element"
    mapping: |
      root.arr = [1, deleted(), 3]
    # FIXME-v1: verify — V1 may retain `null` rather than elide
    skip: "V1 deleted() semantics inside array literals are not equivalent to V2"

  # --- Void in array literal is error ---

  - name: "void in array literal is error"
    mapping: |
      root.arr = [1, if false { 2 }, 3]
    skip: "V2-only: V1 has no 'void' concept; if-without-else yields null, not a void error"
