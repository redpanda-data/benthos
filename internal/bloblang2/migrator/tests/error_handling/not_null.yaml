description: ".not_null() — returns value if not null, throws error on null, optional custom message"

tests:
  # --- Passthrough for non-null values ---

  - name: "not_null passes through string"
    mapping: |
      root.result = "hello".not_null()
    output: {"result": "hello"}

  - name: "not_null passes through integer"
    mapping: |
      root.result = 42.not_null()
    output: {"result": 42}

  - name: "not_null passes through zero"
    mapping: |
      root.result = 0.not_null()
    output: {"result": 0}

  - name: "not_null passes through false"
    mapping: |
      root.result = false.not_null()
    output: {"result": false}

  - name: "not_null passes through empty string"
    mapping: |
      root.result = "".not_null()
    output: {"result": ""}

  - name: "not_null passes through empty array"
    mapping: |
      root.result = [].not_null()
    output: {"result": []}

  - name: "not_null passes through empty object"
    mapping: |
      root.result = {}.not_null()
    output: {"result": {}}

  # --- Error on null with default message ---
  # V1 .not_null() error message is "value is null" (not "unexpected null value")

  - name: "not_null on null produces default error"
    mapping: |
      root.result = null.not_null()
    error: "value is null" # FIXME-v1: verify — V1 uses "value is null" (possibly prefixed with "failed assignment (line N): ")

  - name: "not_null on null input field produces default error"
    input: {}
    mapping: |
      root.result = this.missing_field.not_null()
    error: "value is null" # FIXME-v1: verify

  # --- Error on null with custom message ---
  # V1 .not_null() takes no arguments — there is no custom message form.

  - name: "not_null with custom message on null"
    mapping: |
      root.result = null.not_null("name required")
    skip: "V1 .not_null() does not accept a custom message argument"

  - name: "not_null with custom message on missing input field"
    input: {}
    mapping: |
      root.result = this.email.not_null("email is required")
    skip: "V1 .not_null() does not accept a custom message argument"

  - name: "not_null custom message ignored when value present"
    mapping: |
      root.result = "exists".not_null("should not appear")
    skip: "V1 .not_null() does not accept a custom message argument"

  # --- Caught by catch ---

  - name: "not_null error caught by catch — default message"
    mapping: |
      root.result = null.not_null().catch(err -> "was null")
    output: {"result": "was null"}

  - name: "not_null error caught by catch — custom message accessible"
    mapping: |
      root.result = null.not_null("name required").catch(err -> err.what)
    skip: "V1 .not_null() does not accept a custom message argument; V1 err is a string, not an object with .what"

  - name: "not_null error caught by catch with fallback value"
    input: {}
    mapping: |
      root.result = this.name.not_null().catch(err -> "anonymous")
    output: {"result": "anonymous"} # Note: V1 has no custom message form; dropping the argument

  # --- Chained with or ---

  - name: "or rescues null before not_null is reached"
    input: {}
    mapping: |
      root.result = this.name.or("default").not_null()
    output: {"result": "default"}

  - name: "not_null then or — error propagates through or"
    mapping: |
      root.result = null.not_null().or("default")
    output: {"result": "default"} # FIXME-v1: verify — V1 .or() catches errors too, so the not_null error is caught

  # --- In postfix chain ---

  - name: "not_null in chain with subsequent method"
    mapping: |
      root.result = "hello".not_null().uppercase()
    output: {"result": "HELLO"}

  - name: "not_null error skips subsequent methods"
    mapping: |
      root.result = null.not_null().uppercase()
    error: "value is null" # FIXME-v1: verify

  - name: "not_null on result of field access"
    input: {"user": {"name": "alice"}}
    mapping: |
      root.result = this.user.name.not_null()
    output: {"result": "alice"}

  # --- Used in conditional patterns ---

  - name: "not_null in match arm with null check"
    mapping: |
      root.result = match this.val {
        null => throw("got null"),
        _ => this.not_null(),
      }
    cases:
      - name: "non-null passes through"
        input: {"val": "hello"}
        output: {"result": "hello"}
      - name: "null triggers throw"
        input: {"val": null}
        error: "got null"
    # Note: V1 `match x { ... }` rebinds `this` to `x` inside arm bodies — `this.val`
    # would refer to a .val on the matched scalar. Use `this` to reference the
    # matched value itself (equivalent to V2's `match x as v` binding).

  - name: "not_null with catch as validation pattern"
    input: {"name": null}
    mapping: |
      root.result = this.name.not_null().catch(err -> "unknown")
    output: {"result": "unknown"} # Note: V1 has no custom-message form for .not_null()
