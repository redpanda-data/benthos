description: "Edge cases: precision loss when promoting large int64 to float64, explicit conversion unchecked"

tests:
  # --- int64 > 2^53 + float arithmetic errors ---

  - name: "int64 just above 2^53 plus float is error"
    mapping: |
      root = 9007199254740993 + 1.0
    error: "exact"
    skip: "V1-divergence: V1 silently promotes int64 to float64 for mixed arithmetic (no exactness check)."

  - name: "int64 at 2^53 plus float is ok"
    mapping: |
      root = 9007199254740992 + 1.0
    output: 9007199254740993.0

  - name: "int64 well above 2^53 plus float is error"
    mapping: |
      root = 9223372036854775807 + 0.0
    error: "exact"
    skip: "V1-divergence: V1 silently promotes int64 to float64 (no exactness check)."

  - name: "large int64 minus float is error"
    mapping: |
      root = 9007199254740993 - 1.0
    error: "exact"
    skip: "V1-divergence: V1 silently promotes int64 to float64 (no exactness check)."

  - name: "large int64 times float is error"
    mapping: |
      root = 9007199254740993 * 2.0
    error: "exact"
    skip: "V1-divergence: V1 silently promotes int64 to float64 (no exactness check)."

  - name: "negative large int64 plus float is error"
    mapping: |
      root = -9007199254740993 + 1.0
    error: "exact"
    skip: "V1-divergence: V1 silently promotes int64 to float64 (no exactness check)."

  # --- Small int64 with float is fine ---

  - name: "small int64 plus float is ok"
    mapping: |
      root = 42 + 1.5
    output: 43.5

  - name: "int64 at 2^53 minus 1 plus float is ok"
    mapping: |
      root = 9007199254740991 + 1.0
    output: 9007199254740992.0

  # --- Explicit conversion (.float64()) is unchecked ---

  - name: "explicit float64 conversion of large int64 is unchecked"
    mapping: |
      root = 9007199254740993.float64()
    output: 9007199254740992.0
    skip: "V2-only: V1 has no .float64() method (only the generic .number() coercer)."

  - name: "explicit float64 conversion of int64 max is unchecked"
    mapping: |
      root = 9223372036854775807.float64().type()
    output: "float64"
    skip: "V2-only: V1 has no .float64() method and .type() returns 'number'."

  # --- uint64 > int64 max + int is error ---

  - name: "uint64 above int64 max plus int is error"
    mapping: |
      let big = "18446744073709551615".uint64()
      root = $big + 1
    error: "uint64 value exceeds int64 range"
    skip: "V2-only: V1 has no .uint64() distinct numeric-width conversion."

  # --- Boundary: exactly 2^53 ---

  - name: "int64 exactly 2^53 float64 roundtrip is exact"
    mapping: |
      let v = 9007199254740992
      root = $v + 0.5
    output: 9007199254740992.5

  - name: "int64 exactly 2^53 plus 1 float operation errors"
    mapping: |
      let v = 9007199254740993
      root = $v + 0.5
    error: "exact"
    skip: "V1-divergence: V1 silently promotes int64 to float64 (no exactness check)."
