description: >
  .find() method — returns first matching element or void. Short-circuits
  on first match. Void result can be rescued with .or().

tests:
  # --- Basic find (V2's find(lambda) returns matched element. V1 approximation: filter+index(0)) ---

  - name: "find returns first matching element"
    mapping: |
      root.v = [1, 2, 3, 4, 5].filter(x -> x > 3).index(0)
    output: {"v": 4}

  - name: "find returns first match, not all matches"
    mapping: |
      root.v = [10, 20, 30, 40].filter(x -> x > 15).index(0)
    output: {"v": 20}

  - name: "find with string array"
    mapping: |
      root.v = ["apple", "banana", "cherry"].filter(s -> s.has_prefix("b")).index(0)
    output: {"v": "banana"}

  # --- find returns void when no match (V1 has no void; filter+index(0) returns null) ---

  - name: "find no match — void skips output assignment"
    skip: "V2-only 'void' skips assignment; V1 would assign null"

  - name: "find no match — void errors in variable declaration"
    skip: "V1 has no 'void' concept"

  - name: "find no match — void rescued with or"
    mapping: |
      root.v = [1, 2, 3].filter(x -> x > 100).index(0).or(-1)
    output: {"v": -1}

  - name: "find no match — void in array literal errors"
    skip: "V2-only 'void' error propagation semantics"

  # --- Short-circuit behavior ---

  - name: "find short-circuits after first match"
    mapping: |
      root.v = [1, 2, 3, 4, 5].filter(x -> x == 2).index(0)
    output: {"v": 2}

  # --- find on empty array ---

  - name: "find on empty array returns void — rescued with or"
    mapping: |
      root.v = [].filter(x -> true).index(0).or("nothing")
    output: {"v": "nothing"}

  # --- find with complex predicates ---

  - name: "find with object elements"
    mapping: |
      let users = [
        {"name": "Alice", "age": 25},
        {"name": "Bob", "age": 17},
        {"name": "Carol", "age": 30},
      ]
      root.v = $users.filter(u -> u.age < 18).index(0)
    output: {"v": {"name": "Bob", "age": 17}}

  - name: "find with method chain in predicate"
    mapping: |
      root.v = ["hello", "world", "hi"].filter(s -> s.length() < 4).index(0)
    output: {"v": "hi"}

  - name: "find with outer variable capture"
    mapping: |
      let threshold = 15
      root.v = [10, 20, 30].filter(x -> x > $threshold).index(0)
    output: {"v": 20}
