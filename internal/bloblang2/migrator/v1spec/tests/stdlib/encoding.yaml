description: "Encoding and parsing methods: parse_json, format_json, encode, decode"

tests:
  # --- parse_json: objects ---

  - name: "parse_json object"
    mapping: |
      root = "{\"name\":\"Alice\",\"age\":30}".parse_json()
    output: {"name": "Alice", "age": 30.0}

  - name: "parse_json empty object"
    mapping: |
      root = "{}".parse_json()
    output: {}

  # --- parse_json: arrays ---

  - name: "parse_json array of ints"
    mapping: |
      root = "[1,2,3]".parse_json()
    output: [1.0, 2.0, 3.0]

  - name: "parse_json empty array"
    mapping: |
      root = "[]".parse_json()
    output: []

  # --- parse_json: scalars ---

  - name: "parse_json string"
    mapping: |
      root = "\"hello\"".parse_json()
    output: "hello"

  - name: "parse_json integer is int64"
    mapping: |
      root = "42".parse_json().type()
    output: "number"

  - name: "parse_json integer value"
    mapping: |
      root = "42".parse_json()
    output: 42.0

  - name: "parse_json float with decimal is float64"
    mapping: |
      root = "3.14".parse_json().type()
    output: "number"

  - name: "parse_json float value"
    mapping: |
      root = "3.14".parse_json()
    output: 3.14

  - name: "parse_json exponent is float64"
    mapping: |
      root = "1e3".parse_json().type()
    output: "number"

  - name: "parse_json exponent value"
    mapping: |
      root = "1e3".parse_json()
    output: 1000.0

  - name: "parse_json boolean true"
    mapping: |
      root = "true".parse_json()
    output: true

  - name: "parse_json boolean false"
    mapping: |
      root = "false".parse_json()
    output: false

  - name: "parse_json null"
    mapping: |
      root = "null".parse_json()
    output: null

  - name: "parse_json negative integer"
    mapping: |
      root = "-100".parse_json()
    output: -100.0

  - name: "parse_json zero integer"
    mapping: |
      root = "0".parse_json()
    output: 0.0

  # --- parse_json: errors ---

  - name: "parse_json invalid json"
    mapping: |
      root = "not json".parse_json()
    error: "parse"

  - name: "parse_json empty string"
    mapping: |
      root = "".parse_json()
    error: "parse"

  - name: "parse_json truncated object"
    mapping: |
      root = "{\"name\":".parse_json()
    error: "parse"

  # --- format_json (V1 default indent is 4 spaces; use no_indent:true for compact) ---

  - name: "format_json object keys sorted"
    mapping: |
      root = {"b": 2, "a": 1}.format_json(no_indent: true).string()
    output: '{"a":1,"b":2}'

  - name: "format_json array"
    mapping: |
      root = [1, 2, 3].format_json(no_indent: true).string()
    output: "[1,2,3]"

  - name: "format_json string"
    mapping: |
      root = "hello".format_json(no_indent: true).string()
    output: '"hello"'

  - name: "format_json integer"
    mapping: |
      root = 42.format_json(no_indent: true).string()
    output: "42"

  - name: "format_json boolean"
    mapping: |
      root = true.format_json(no_indent: true).string()
    output: "true"

  - name: "format_json null"
    mapping: |
      root = null.format_json(no_indent: true).string()
    output: "null"

  - name: "format_json empty object"
    mapping: |
      root = {}.format_json(no_indent: true).string()
    output: "{}"

  - name: "format_json empty array"
    skip: "V1 format_json on empty array returns 'null' (known V1 quirk)"

  # --- format_json: indent ---

  - name: "format_json with two-space indent"
    mapping: |
      root = {"a": 1}.format_json(indent: "  ").string()
    output: "{\n  \"a\": 1\n}"

  - name: "format_json with tab indent"
    mapping: |
      root = {"a": 1}.format_json(indent: "\t").string()
    output: "{\n\t\"a\": 1\n}"

  # --- format_json: escape_html ---

  - name: "format_json escapes html by default"
    mapping: |
      root = {"html": "<b>hi</b>"}.format_json(no_indent: true).string()
    output: "{\"html\":\"\\u003cb\\u003ehi\\u003c/b\\u003e\"}"

  - name: "format_json escape_html false"
    mapping: |
      root = {"html": "<b>hi</b>"}.format_json(no_indent: true, escape_html: false).string()
    output: '{"html":"<b>hi</b>"}'

  # --- format_json: timestamps (V1 has no timestamp() constructor) ---

  - name: "format_json timestamp as RFC 3339"
    skip: "V1 has no timestamp() function constructor"

  - name: "format_json timestamp in object uses shortest precision"
    skip: "V1 has no timestamp() function constructor"

  - name: "format_json timestamp with fractional seconds in object"
    skip: "V1 has no timestamp() function constructor"

  - name: "format_json timestamp in nested array"
    skip: "V1 has no timestamp() function constructor"

  # --- format_json: errors ---

  - name: "format_json bytes is error"
    skip: "V1 format_json accepts bytes (coerces to string)"

  - name: "format_json nested bytes is error"
    skip: "V1 format_json accepts bytes (coerces to string)"

  - name: "format_json NaN is error"
    skip: "V2-only _type NaN literal; V1 has no NaN literal"

  - name: "format_json Infinity is error"
    skip: "V2-only _type Infinity literal; V1 has no Infinity literal"

  # --- format_json / parse_json round-trip ---

  - name: "format then parse round-trip object"
    mapping: |
      let obj = {"name": "Alice", "age": 30}
      root = $obj.format_json(no_indent: true).parse_json()
    output: {"name": "Alice", "age": 30.0}

  - name: "format then parse round-trip array"
    mapping: |
      let arr = [1, "two", true, null]
      root = $arr.format_json(no_indent: true).parse_json()
    output: [1.0, "two", true, null]

  # --- encode: base64 ---

  - name: "encode base64 from string"
    mapping: |
      root = "hello".encode("base64")
    output: "aGVsbG8="

  - name: "encode base64 from bytes"
    mapping: |
      root = "hello".bytes().encode("base64")
    output: "aGVsbG8="

  - name: "encode base64 empty string"
    mapping: |
      root = "".encode("base64")
    output: ""

  # --- encode: base64url ---

  - name: "encode base64url"
    mapping: |
      root = "hello?world>".encode("base64url")
    output: "aGVsbG8_d29ybGQ-"

  # --- encode: base64rawurl ---

  - name: "encode base64rawurl no padding"
    mapping: |
      root = "hello".encode("base64rawurl")
    output: "aGVsbG8"

  # --- encode: hex ---

  - name: "encode hex from string"
    mapping: |
      root = "hello".encode("hex")
    output: "68656c6c6f"

  - name: "encode hex from bytes"
    mapping: |
      root = "hello".bytes().encode("hex")
    output: "68656c6c6f"

  - name: "encode hex empty"
    mapping: |
      root = "".encode("hex")
    output: ""

  # --- decode: base64 ---

  - name: "decode base64 returns bytes"
    mapping: |
      root = "aGVsbG8=".decode("base64").type()
    output: "bytes"

  - name: "decode base64 to string"
    mapping: |
      root = "aGVsbG8=".decode("base64").string()
    output: "hello"

  # --- decode: base64url ---

  - name: "decode base64url to string"
    mapping: |
      root = "aGVsbG8_d29ybGQ-".decode("base64url").string()
    output: "hello?world>"

  # --- decode: base64rawurl ---

  - name: "decode base64rawurl to string"
    mapping: |
      root = "aGVsbG8".decode("base64rawurl").string()
    output: "hello"

  # --- decode: hex ---

  - name: "decode hex returns bytes"
    mapping: |
      root = "68656c6c6f".decode("hex").type()
    output: "bytes"

  - name: "decode hex to string"
    mapping: |
      root = "68656c6c6f".decode("hex").string()
    output: "hello"

  # --- decode: errors ---

  - name: "decode invalid base64"
    mapping: |
      root = "!!!".decode("base64")
    error: "EOF"

  - name: "decode invalid hex"
    mapping: |
      root = "zzzz".decode("hex")
    error: "invalid byte"

  # --- encode/decode round-trips ---

  - name: "base64 encode decode round-trip"
    mapping: |
      root = "hello world!".encode("base64").decode("base64").string()
    output: "hello world!"

  - name: "hex encode decode round-trip"
    mapping: |
      root = "hello world!".encode("hex").decode("hex").string()
    output: "hello world!"

  - name: "base64rawurl encode decode round-trip"
    mapping: |
      root = "test data".encode("base64rawurl").decode("base64rawurl").string()
    output: "test data"

  - name: "base64url encode decode round-trip"
    mapping: |
      root = "test data".encode("base64url").decode("base64url").string()
    output: "test data"

  # --- encode: named arg ---

  - name: "encode with named scheme arg"
    mapping: |
      root = "hello".encode(scheme: "hex")
    output: "68656c6c6f"

  - name: "decode with named scheme arg"
    mapping: |
      root = "68656c6c6f".decode(scheme: "hex").string()
    output: "hello"
