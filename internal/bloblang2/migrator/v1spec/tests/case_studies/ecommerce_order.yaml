description: >
  E-commerce order normalization — flatten a Shopify-style order into a
  warehouse-friendly format. Joins fulfillment tracking back to line items,
  computes net prices from string-encoded decimals, converts units, formats
  addresses, and detects billing/shipping mismatches.

tests:
  - name: "normalize Shopify order for warehouse ERP"
    input:
      order:
        id: 5765806342
        email: "jane@example.com"
        created_at: "2024-01-15T10:30:00-05:00"
        currency: "USD"
        billing_address:
          first_name: "John"
          last_name: "Smith"
          address1: "123 Fake Street"
          city: "Faketown"
          province_code: "ON"
          country_code: "CA"
          zip: "K2P 1L4"
        shipping_address:
          first_name: "Jane"
          last_name: "Smith"
          address1: "123 Fake Street"
          city: "Faketown"
          province_code: "ON"
          country_code: "CA"
          zip: "K2P 1L4"
        line_items:
          - id: 1001
            title: "Red Leather Coat"
            sku: "RLC-001"
            quantity: 1
            price: "129.99"
            grams: 1700
            tax_lines:
              - {price: "7.80"}
            discount_allocations:
              - {amount: "13.00"}
          - id: 1002
            title: "Blue Suede Shoes"
            sku: "BSS-001"
            quantity: 1
            price: "85.95"
            grams: 750
            tax_lines: []
            discount_allocations: []
          - id: 1003
            title: "Raspberry Beret"
            sku: "RB-001"
            quantity: 2
            price: "19.99"
            grams: 320
            tax_lines:
              - {price: "2.40"}
            discount_allocations: []
        fulfillments:
          - id: 1
            tracking_numbers: ["1Z999AA10123456784"]
            line_items:
              - {id: 1001}
              - {id: 1002}
        discount_codes:
          - {code: "FAKE30"}
    mapping: |
      # V1 maps take a single receiver (`this`); V2 parameterised maps become
      # single-receiver maps invoked via .apply, with the argument reshaped to
      # pass data through `this`.
      map format_address {
        root = this.first_name + " " + this.last_name + ", " +
          this.address1 + ", " + this.city + " " +
          this.province_code + " " + this.zip + ", " + this.country_code
      }

      let order = this.order
      let fulfillments = $order.fulfillments
      let bill = $order.billing_address
      let ship = $order.shipping_address

      # V2 .float64() → V1 .number().
      # V2 .find(lambda) → V1 .filter(lambda).index(0).
      # V2 ?.x → V1 .x | null.
      # V2 block-body lambdas with `let` do not exist in V1; inline each item's
      # derived values through the .(capture -> body) named-capture form.
      let items = $order.line_items.map_each(item -> $fulfillments.filter(f -> f.line_items.any(li -> li.id == item.id)).index(0).or(null).(ful -> {"sku": item.sku, "title": item.title, "quantity": item.quantity, "unit_price": item.price.number(), "discount": item.discount_allocations.map_each(d -> d.amount.number()).sum(), "tax_total": item.tax_lines.map_each(t -> t.price.number()).sum(), "net_price": ((item.price.number() * item.quantity - item.discount_allocations.map_each(d -> d.amount.number()).sum() + item.tax_lines.map_each(t -> t.price.number()).sum()) * 100).round() / 100, "weight_kg": (item.grams * item.quantity).number() / 1000.0, "fulfilled": ful != null, "tracking": ful.tracking_numbers.0 | null}))

      root.order_id = $order.id
      root.order_date = $order.created_at.slice(0, 10)
      root.customer_email = $order.email
      root.currency = $order.currency
      root.shipping_differs_from_billing = $bill.first_name != $ship.first_name ||
        $bill.last_name != $ship.last_name ||
        $bill.address1 != $ship.address1 ||
        $bill.city != $ship.city
      root.ship_to = $ship.apply("format_address")
      root.items = $items
      root.unfulfilled_count = $items.filter(i -> !i.fulfilled).length()
      root.total_weight_kg = ($items.map_each(i -> i.weight_kg).sum() * 100).round() / 100
      root.discount_codes_used = $order.discount_codes.map_each(d -> d.code)
    output:
      order_id: 5765806342
      order_date: "2024-01-15"
      customer_email: "jane@example.com"
      currency: "USD"
      shipping_differs_from_billing: true
      ship_to: "Jane Smith, 123 Fake Street, Faketown ON K2P 1L4, CA"
      items:
        - sku: "RLC-001"
          title: "Red Leather Coat"
          quantity: 1
          unit_price: 129.99
          discount: 13.0
          tax_total: 7.8
          net_price: 124.79
          weight_kg: 1.7
          fulfilled: true
          tracking: "1Z999AA10123456784"
        - sku: "BSS-001"
          title: "Blue Suede Shoes"
          quantity: 1
          unit_price: 85.95
          discount: 0.0
          tax_total: 0.0
          net_price: 85.95
          weight_kg: 0.75
          fulfilled: true
          tracking: "1Z999AA10123456784"
        - sku: "RB-001"
          title: "Raspberry Beret"
          quantity: 2
          unit_price: 19.99
          discount: 0.0
          tax_total: 2.4
          net_price: 42.38
          weight_kg: 0.64
          fulfilled: false
          tracking: null
      unfulfilled_count: 1
      total_weight_kg: 3.09
      discount_codes_used: ["FAKE30"]
