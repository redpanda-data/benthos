description: "void() builtin — explicit spelling of the void sentinel (Section 13.1)"

tests:
  # --- Statement RHS: assignment skipped ---

  - name: "void() as output RHS skips assignment (no prior)"
    mapping: |
      output.a = void()
      output.b = 1
    output: {"b": 1}

  - name: "void() as output RHS leaves prior value intact"
    mapping: |
      output.v = "pending"
      output.v = void()
    output: {"v": "pending"}

  - name: "void() as root output RHS with no prior is skipped (stays {})"
    mapping: |
      output = void()
    output: {}

  - name: "void() as root output RHS preserves prior root assignment"
    mapping: |
      output = {"kept": true}
      output = void()
    output: {"kept": true}

  - name: "void() as root output RHS preserves prior field assignments"
    mapping: |
      output.a = 1
      output.b = 2
      output = void()
    output: {"a": 1, "b": 2}

  - name: "void() as root output via if-without-else is skipped"
    mapping: |
      output.keep = 1
      output = if false { "replace" }
    output: {"keep": 1}

  - name: "void() in if branch skips assignment"
    mapping: |
      output.status = if input.ready { "done" } else { void() }
    input: {"ready": false}
    output: {}

  - name: "void() in if branch leaves prior value intact"
    mapping: |
      output.status = "pending"
      output.status = if input.ready { "done" } else { void() }
    input: {"ready": false}
    output: {"status": "pending"}

  # --- Match: void() in a case arm ---

  - name: "void() in match case skips assignment"
    mapping: |
      output.c = match input.kind {
        "a" => "apple",
        "b" => "banana",
        _   => void(),
      }
    input: {"kind": "c"}
    output: {}

  - name: "void() in match case works alongside other arms"
    mapping: |
      output.c = match input.kind {
        "a" => "apple",
        _   => void(),
      }
    input: {"kind": "a"}
    output: {"c": "apple"}

  # --- Variable assignments ---

  - name: "void() as variable declaration RHS is a runtime error"
    mapping: |
      $x = void()
      output.v = $x
    error: ""

  - name: "void() as variable reassignment preserves prior value"
    mapping: |
      $x = 10
      $x = void()
      output.v = $x
    output: {"v": 10}

  # --- Collection literals: void() errors, use deleted() instead ---

  - name: "void() in array literal is a runtime error"
    mapping: |
      output.items = [1, void(), 3]
    error: ""

  - name: "void() in object literal value is a runtime error"
    mapping: |
      output.obj = {"a": 1, "b": void(), "c": 3}
    error: ""

  - name: "deleted() omits in collection literal (contrast with void)"
    mapping: |
      output.items = [1, deleted(), 3]
      output.obj = {"a": 1, "b": deleted(), "c": 3}
    output: {"items": [1, 3], "obj": {"a": 1, "c": 3}}

  # --- Operand / argument: void() errors ---

  - name: "void() as operator operand is a runtime error"
    mapping: |
      output.v = void() + 1
    error: ""

  - name: "void() as function argument is a runtime error"
    mapping: |
      output.v = throw(void())
    error: ""

  # --- .or() rescues void ---

  - name: ".or() rescues void() to a default"
    mapping: |
      output.v = void().or("fallback")
    output: {"v": "fallback"}

  # --- .catch() passes void through unchanged (then rescued later) ---

  - name: ".catch().or() rescues void() produced earlier in the chain"
    mapping: |
      output.v = void().catch(_ -> "caught").or("fallback")
    output: {"v": "fallback"}

  # --- In .map() lambdas: error ---

  - name: ".map() lambda returning void() is a runtime error"
    mapping: |
      output.xs = [1, 2, 3].map(_ -> void())
    error: ""

  # --- type() on void: error ---

  - name: ".type() on void() is a runtime error"
    mapping: |
      output.t = void().type()
    error: ""

  # --- void() has no arguments ---

  - name: "void() with an argument is a compile error"
    mapping: |
      output.v = void(1)
    compile_error: "void"

  # --- void is a reserved name (Section 1.3) ---
  # Mirrors the restrictions on `deleted` and `throw`: cannot be a variable,
  # map, or parameter name. Field names are unaffected (they use `word`).

  - name: "void cannot be used as a variable name"
    mapping: |
      $void = 1
      output.v = $void
    compile_error: "void"

  - name: "void cannot be used as a map name"
    mapping: |
      map void(x) { x + 1 }
      output.v = void(1)
    compile_error: "void"

  - name: "void cannot be used as a map parameter name"
    mapping: |
      map wrap(void) { void }
      output.v = wrap(1)
    compile_error: "void"

  - name: "void cannot be used as a lambda parameter name"
    mapping: |
      output.xs = [1, 2, 3].map(void -> void + 1)
    compile_error: "void"

  - name: "void cannot be used as a match as binding"
    mapping: |
      output.v = match input.x as void {
        void > 0 => "pos",
        _ => "other",
      }
    input: {"x": 1}
    compile_error: "void"

  - name: "void is valid as a field name after ."
    mapping: |
      output.void = input.void
    input: {"void": 42}
    output: {"void": 42}

  - name: "void is valid as a metadata key"
    mapping: |
      output@.void = "routed"
      output.x = input@.void
    input_metadata: {"void": "inbound"}
    output: {"x": "inbound"}
    output_metadata: {"void": "routed"}
