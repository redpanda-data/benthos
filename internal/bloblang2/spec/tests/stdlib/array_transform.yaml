description: "Array transform methods — filter, map, sort, sort_by, flatten, unique, enumerate"

tests:
  # --- filter ---

  - name: "filter keeps matching elements"
    mapping: |
      output.result = [1, 2, 3, 4, 5].filter(x -> x > 3)
    output: {"result": [4, 5]}

  - name: "filter with no matches returns empty array"
    mapping: |
      output.result = [1, 2, 3].filter(x -> x > 100)
    output: {"result": []}

  - name: "filter on empty array returns empty array"
    mapping: |
      output.result = [].filter(x -> x > 0)
    output: {"result": []}

  - name: "filter keeps all when all match"
    mapping: |
      output.result = [10, 20, 30].filter(x -> x > 0)
    output: {"result": [10, 20, 30]}

  - name: "filter preserves original element types"
    mapping: |
      output.result = ["apple", "banana", "avocado"].filter(s -> s.has_prefix("a"))
    output: {"result": ["apple", "avocado"]}

  - name: "filter non-bool return is error"
    mapping: |
      output.result = [1, 2, 3].filter(x -> x * 2)
    error: "bool"

  - name: "filter void return is error"
    mapping: |
      output.result = [1, 2, 3].filter(x -> if false { true })
    error: "bool"

  - name: "filter does not modify original array"
    mapping: |
      $arr = [1, 2, 3, 4]
      $filtered = $arr.filter(x -> x > 2)
      output.original = $arr
      output.filtered = $filtered
    output: {"original": [1, 2, 3, 4], "filtered": [3, 4]}

  # --- map ---

  - name: "map doubles each element"
    mapping: |
      output.result = [1, 2, 3].map(x -> x * 2)
    output: {"result": [2, 4, 6]}

  - name: "map on empty array returns empty array"
    mapping: |
      output.result = [].map(x -> x + 1)
    output: {"result": []}

  - name: "map can change element types"
    mapping: |
      output.result = [1, 2, 3].map(x -> x.string())
    output: {"result": ["1", "2", "3"]}

  - name: "map deleted omits element"
    mapping: |
      output.result = [1, 2, 3, 4].map(x -> if x % 2 == 0 { x * 10 } else { deleted() })
    output: {"result": [20, 40]}

  - name: "map void return is error"
    mapping: |
      output.result = [1, 2].map(x -> if false { x })
    error: "void"

  - name: "map does not modify original array"
    mapping: |
      $arr = [1, 2, 3]
      $mapped = $arr.map(x -> x + 10)
      output.original = $arr
      output.mapped = $mapped
    output: {"original": [1, 2, 3], "mapped": [11, 12, 13]}

  - name: "map with block body"
    mapping: |
      output.result = [1, 2, 3].map(x -> {
        $doubled = x * 2
        $doubled + 1
      })
    output: {"result": [3, 5, 7]}

  # --- sort ---

  - name: "sort integers ascending"
    mapping: |
      output.result = [3, 1, 4, 1, 5].sort()
    output: {"result": [1, 1, 3, 4, 5]}

  - name: "sort empty array"
    mapping: |
      output.result = [].sort()
    output: {"result": []}

  - name: "sort single element"
    mapping: |
      output.result = [42].sort()
    output: {"result": [42]}

  - name: "sort strings lexicographic"
    mapping: |
      output.result = ["banana", "apple", "cherry"].sort()
    output: {"result": ["apple", "banana", "cherry"]}

  - name: "sort floats ascending"
    mapping: |
      output.result = [3.14, 1.0, 2.71].sort()
    output: {"result": [1.0, 2.71, 3.14]}

  - name: "sort numeric promotion int and float"
    mapping: |
      output.result = [3, 1.5, 2].sort()
    output: {"result": [1.5, 2, 3]}

  - name: "sort is stable"
    mapping: |
      $items = [{"k": "a", "v": 2}, {"k": "b", "v": 1}, {"k": "c", "v": 2}]
      output.result = $items.sort_by(x -> x.v).map(x -> x.k)
    output: {"result": ["b", "a", "c"]}

  - name: "sort cross-family is error"
    mapping: |
      output.result = [1, "two", 3].sort()
    error: "sort"

  - name: "sort booleans is error"
    mapping: |
      output.result = [true, false, true].sort()
    error: "sort"

  - name: "sort nulls is error"
    mapping: |
      output.result = [null, null].sort()
    error: "sort"

  - name: "sort NaN sorts after all values"
    input: {"nan": {_type: "float64", value: "NaN"}}
    mapping: |
      output.result = [input.nan, 1.0, 3.0, 2.0].sort()
    output: {"result": [1.0, 2.0, 3.0, {_type: "float64", value: "NaN"}]}

  # --- sort_by ---

  - name: "sort_by with key function"
    mapping: |
      $items = [{"name": "Charlie"}, {"name": "Alice"}, {"name": "Bob"}]
      output.result = $items.sort_by(x -> x.name)
    output: {"result": [{"name": "Alice"}, {"name": "Bob"}, {"name": "Charlie"}]}

  - name: "sort_by numeric key"
    mapping: |
      $items = [{"score": 80}, {"score": 95}, {"score": 70}]
      output.result = $items.sort_by(x -> x.score)
    output: {"result": [{"score": 70}, {"score": 80}, {"score": 95}]}

  - name: "sort_by empty array"
    mapping: |
      output.result = [].sort_by(x -> x)
    output: {"result": []}

  - name: "sort_by cross-family keys is error"
    mapping: |
      $items = [{"k": 1}, {"k": "two"}]
      output.result = $items.sort_by(x -> x.k)
    error: "sort"

  # --- flatten ---

  - name: "flatten nested arrays one level"
    mapping: |
      output.result = [[1, 2], [3, 4], [5]].flatten()
    output: {"result": [1, 2, 3, 4, 5]}

  - name: "flatten only one level deep"
    mapping: |
      output.result = [[[1, 2]], [[3]]].flatten()
    output: {"result": [[1, 2], [3]]}

  - name: "flatten non-arrays kept as-is"
    mapping: |
      output.result = [1, [2, 3], "hello", [4]].flatten()
    output: {"result": [1, 2, 3, "hello", 4]}

  - name: "flatten empty inner arrays spliced as zero elements"
    mapping: |
      output.result = [1, [], 2, [], 3].flatten()
    output: {"result": [1, 2, 3]}

  - name: "flatten empty array"
    mapping: |
      output.result = [].flatten()
    output: {"result": []}

  - name: "flatten array of empty arrays"
    mapping: |
      output.result = [[], [], []].flatten()
    output: {"result": []}

  - name: "flatten mixed types with nested arrays"
    mapping: |
      output.result = [null, [true, false], "abc"].flatten()
    output: {"result": [null, true, false, "abc"]}

  # --- unique ---

  - name: "unique removes duplicates"
    mapping: |
      output.result = [1, 2, 2, 3, 1, 3].unique()
    output: {"result": [1, 2, 3]}

  - name: "unique keeps first occurrence"
    mapping: |
      output.result = [3, 1, 2, 1, 3].unique()
    output: {"result": [3, 1, 2]}

  - name: "unique on empty array"
    mapping: |
      output.result = [].unique()
    output: {"result": []}

  - name: "unique strings"
    mapping: |
      output.result = ["a", "b", "a", "c", "b"].unique()
    output: {"result": ["a", "b", "c"]}

  - name: "unique with key function"
    mapping: |
      $items = [{"id": 1, "v": "a"}, {"id": 2, "v": "b"}, {"id": 1, "v": "c"}]
      output.result = $items.unique(x -> x.id)
    output: {"result": [{"id": 1, "v": "a"}, {"id": 2, "v": "b"}]}

  - name: "unique NaN values considered equal"
    input: {"nan1": {_type: "float64", value: "NaN"}, "nan2": {_type: "float64", value: "NaN"}}
    mapping: |
      output.result = [input.nan1, 1.0, input.nan2, 2.0].unique()
    output: {"result": [{_type: "float64", value: "NaN"}, 1.0, 2.0]}

  - name: "unique mixed types preserved"
    mapping: |
      output.result = [1, "1", true, 1, "1", true].unique()
    output: {"result": [1, "1", true]}

  # --- enumerate ---

  - name: "enumerate basic"
    mapping: |
      output.result = ["a", "b", "c"].enumerate()
    output: {"result": [{"index": 0, "value": "a"}, {"index": 1, "value": "b"}, {"index": 2, "value": "c"}]}

  - name: "enumerate empty array"
    mapping: |
      output.result = [].enumerate()
    output: {"result": []}

  - name: "enumerate single element"
    mapping: |
      output.result = [42].enumerate()
    output: {"result": [{"index": 0, "value": 42}]}

  - name: "enumerate preserves element types"
    mapping: |
      output.result = [true, null, 3.14].enumerate()
    output: {"result": [{"index": 0, "value": true}, {"index": 1, "value": null}, {"index": 2, "value": 3.14}]}
