description: "Default parameter values in lambda expressions"

tests:
  # --- Basic defaults ---

  - name: "single param with default — value provided"
    mapping: |
      output.result = [1, 2, 3].fold(0, (tally, x = 10) -> tally + x)
    output: {"result": 6}

  - name: "lambda default integer literal"
    mapping: |
      output.result = [1, 2, 3].map((x, y = 10) -> x + y)
    output: {"result": [11, 12, 13]}

  - name: "lambda default string literal"
    mapping: |
      output.result = {"a": 1, "b": 2}.map_entries((k, v, suffix = "_key") -> {"key": k + suffix, "value": v})
    output: {"result": {"a_key": 1, "b_key": 2}}

  - name: "lambda default boolean literal"
    mapping: |
      output.result = [1, -2, 3].map((x, negate = false) -> if negate { -x } else { x })
    output: {"result": [1, -2, 3]}

  - name: "lambda default null literal"
    mapping: |
      output.result = [1, 2, 3].map((x, extra = null) -> x + extra.or(0))
    output: {"result": [1, 2, 3]}

  - name: "lambda default float literal"
    mapping: |
      output.result = [10, 20].map((x, rate = 0.1) -> x * rate)
    output: {"result": [1.0, 2.0]}

  # --- Positional omission ---

  - name: "trailing default params omitted"
    mapping: |
      output.result = [5, 10].map((x, multiplier = 2, offset = 0) -> x * multiplier + offset)
    output: {"result": [10, 20]}

  # --- Defaults must come after required ---

  - name: "default before required is compile error"
    mapping: |
      output.result = [1].map((x = 0, y) -> x + y)
    compile_error: "default"

  # --- Default values must be literals ---

  - name: "default value expression is compile error"
    mapping: |
      output.result = [1].map((x, y = 1 + 2) -> x + y)
    compile_error: "literal"

  - name: "default value variable reference is compile error"
    mapping: |
      $val = 5
      output.result = [1].map((x, y = $val) -> x + y)
    compile_error: "literal"

  - name: "default value function call is compile error"
    mapping: |
      output.result = [1].map((x, y = uuid_v4()) -> x)
    compile_error: "literal"

  # --- Multiple defaults ---

  - name: "multiple default params all using defaults"
    mapping: |
      output.result = [100].map((x, tax_rate = 0.1, discount = 0) -> {
        $subtotal = x - discount
        $subtotal + $subtotal * tax_rate
      })
    output: {"result": [110.0]}

  # --- Discard cannot have default ---

  - name: "discard param with default is compile error"
    mapping: |
      output.result = [1].map((_ = 0, x) -> x)
    compile_error: "discard"
