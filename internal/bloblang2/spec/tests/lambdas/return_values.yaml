description: "Lambda return values — void errors, deleted() omission, filter boolean requirement, catch handler semantics"

tests:
  # --- Void in .map() is error ---

  - name: "map lambda returning void is error"
    mapping: |
      output.result = [1, 2, 3].map(x -> if x > 10 { x })
    error: "void"

  - name: "map lambda void from match is error"
    mapping: |
      output.result = [1, 2].map(x -> match x { 99 => "found" })
    error: "void"

  # --- Void in .filter() is error ---

  - name: "filter lambda returning void is error"
    mapping: |
      output.result = [1, 2, 3].filter(x -> if x > 10 { true })
    error: "void"

  # --- Filter requires boolean ---

  - name: "filter lambda returning non-boolean is error"
    mapping: |
      output.result = [1, 2, 3].filter(x -> x * 2)
    error: "bool"

  - name: "filter lambda returning string is error"
    mapping: |
      output.result = [1, 2, 3].filter(x -> "yes")
    error: "bool"

  - name: "filter lambda returning null is error"
    mapping: |
      output.result = [1, 2, 3].filter(x -> null)
    error: "bool"

  - name: "filter lambda returning boolean works"
    mapping: |
      output.result = [1, 2, 3, 4].filter(x -> x % 2 == 0)
    output: {"result": [2, 4]}

  # --- deleted() in .map() omits element ---

  - name: "map lambda returning deleted omits element"
    mapping: |
      output.result = [1, -2, 3, -4].map(x -> if x > 0 { x } else { deleted() })
    output: {"result": [1, 3]}

  - name: "map lambda all deleted returns empty array"
    mapping: |
      output.result = [1, 2, 3].map(x -> deleted())
    output: {"result": []}

  - name: "map lambda deleted from match"
    mapping: |
      output.result = ["a", "bb", "c", "dd"].map(s -> match {
        s.length() > 1 => s.uppercase(),
        _ => deleted(),
      })
    output: {"result": ["BB", "DD"]}

  # --- deleted() in .map_values() omits entry ---

  - name: "map_values deleted omits entry"
    mapping: |
      output.result = {"a": 1, "b": -2, "c": 3}.map_values(v -> if v > 0 { v } else { deleted() })
    output: {"result": {"a": 1, "c": 3}}

  # --- .catch() handler returning deleted ---

  - name: "catch handler returning deleted removes field"
    mapping: |
      output.value = "not a number".int64().catch(err -> deleted())
    output: {}

  - name: "catch handler returning deleted with prior value"
    mapping: |
      output.value = "prior"
      output.value = "not a number".int64().catch(err -> deleted())
    output: {}

  # --- .catch() handler returning void ---

  - name: "catch handler returning void skips assignment"
    mapping: |
      output.value = "prior"
      output.value = "not a number".int64().catch(err -> if false { 0 })
    output: {"value": "prior"}

  - name: "catch handler void on fresh field leaves it absent"
    mapping: |
      output.value = "not a number".int64().catch(err -> if false { 0 })
    output: {}

  # --- .catch() handler normal value ---

  - name: "catch handler provides fallback value"
    mapping: |
      output.value = "not a number".int64().catch(err -> -1)
    output: {"value": {_type: "int64", value: "-1"}}

  - name: "catch handler can access error message"
    mapping: |
      output.msg = throw("custom error").catch(err -> err.what)
    output: {"msg": "custom error"}

  # --- Void in .fold() is error ---

  - name: "fold lambda returning void is error"
    mapping: |
      output.result = [1, 2, 3].fold(0, (acc, x) -> if x > 10 { acc + x })
    error: "void"

  # --- Void in .map_values() is error ---

  - name: "map_values lambda returning void is error"
    mapping: |
      output.result = {"a": 1}.map_values(v -> if v > 10 { v })
    error: "void"

  # --- Void in .sort_by() is error ---

  - name: "sort_by lambda returning void is error"
    mapping: |
      output.result = [1, 2].sort_by(x -> if x > 10 { x })
    error: "void"

  # --- .catch() passes through on success ---

  - name: "catch not triggered on success"
    mapping: |
      output.value = "42".int64().catch(err -> -1)
    output: {"value": {_type: "int64", value: "42"}}

  # --- deleted() in filter is error (not boolean) ---

  - name: "filter lambda returning deleted is error"
    mapping: |
      output.result = [1, 2, 3].filter(x -> deleted())
    error: "bool"
