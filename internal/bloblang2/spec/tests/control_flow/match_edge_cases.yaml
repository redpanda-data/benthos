description: >
  Match expression edge cases — equality match with various types,
  match-as with complex expressions, wildcard semantics, and
  interactions with void and deleted.

tests:
  # --- Equality match with various types ---

  - name: "equality match on integer"
    mapping: |
      output.v = match 2 {
        1 => "one",
        2 => "two",
        3 => "three",
        _ => "other",
      }
    output: {"v": "two"}

  - name: "equality match on string"
    mapping: |
      output.v = match "hello" {
        "hi" => "informal",
        "hello" => "formal",
        _ => "unknown",
      }
    output: {"v": "formal"}

  - name: "equality match on null"
    mapping: |
      output.v = match null {
        null => "is null",
        _ => "not null",
      }
    output: {"v": "is null"}

  - name: "equality match falls through to wildcard"
    mapping: |
      output.v = match "xyz" {
        "a" => 1,
        "b" => 2,
        _ => 0,
      }
    output: {"v": 0}

  - name: "equality match with float"
    mapping: |
      output.v = match 3.14 {
        3.14 => "pi",
        2.71 => "e",
        _ => "other",
      }
    output: {"v": "pi"}

  # --- match subject evaluated once ---

  - name: "match subject expression evaluated once"
    mapping: |
      $counter = 0
      $counter = $counter + 1
      output.v = match $counter {
        1 => "one",
        2 => "two",
        _ => "many",
      }
    output: {"v": "one"}

  # --- match-as binding ---

  - name: "match-as binds value to variable"
    mapping: |
      output.v = match input.data as d {
        d > 10 => "big",
        d > 0 => "small",
        _ => "zero or negative",
      }
    input: {"data": 5}
    output: {"v": "small"}

  - name: "match-as variable used in result expression"
    mapping: |
      output.v = match input.name as n {
        n.length() > 5 => n.uppercase(),
        _ => n.lowercase(),
      }
    cases:
      - name: "long name uppercased"
        input: {"name": "Alexander"}
        output: {"v": "ALEXANDER"}
      - name: "short name lowercased"
        input: {"name": "Bob"}
        output: {"v": "bob"}

  - name: "match-as variable not accessible outside match"
    mapping: |
      output.v = match "hello" as s {
        true => s,
      }
      output.leaked = $s
    compile_error: "undeclared"

  # --- Wildcard catches all ---

  - name: "wildcard matches any value"
    mapping: |
      output.v = match "anything" {
        _ => "caught",
      }
    output: {"v": "caught"}

  # --- Match with deleted in result ---

  - name: "match result is deleted — field removed"
    mapping: |
      output.keep = "yes"
      output.maybe = "testing"
      output.maybe = match "remove" {
        "remove" => deleted(),
        _ => output.maybe,
      }
    output: {"keep": "yes"}

  # --- Match with void from if-without-else in arm ---

  - name: "match arm contains if-without-else producing void"
    mapping: |
      output.v = "default"
      output.v = match "a" {
        "a" => if false { "override" },
        _ => "fallback",
      }
    output: {"v": "default"}

  # --- Nested match ---

  - name: "nested match expressions"
    mapping: |
      output.v = match input.type {
        "user" => match input.role {
          "admin" => "full access",
          "viewer" => "read only",
          _ => "limited",
        },
        _ => "unknown type",
      }
    cases:
      - name: "user admin gets full access"
        input: {"type": "user", "role": "admin"}
        output: {"v": "full access"}
      - name: "non-user type falls through"
        input: {"type": "device", "role": "admin"}
        output: {"v": "unknown type"}

  # --- Match in statement context ---

  - name: "match statement modifies output conditionally"
    mapping: |
      output.status = "unknown"
      match input.code {
        200 => { output.status = "ok" },
        404 => { output.status = "not found" },
        _ => { output.status = "error" },
      }
    input: {"code": 404}
    output: {"status": "not found"}

  - name: "match statement with no matching arm is no-op"
    mapping: |
      output.status = "default"
      match "nope" {
        "a" => { output.status = "a" },
        "b" => { output.status = "b" },
      }
    output: {"status": "default"}
