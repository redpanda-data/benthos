description: >
  Kubernetes pod health alert — zip container spec with status by name to
  correlate resource limits with failure reasons, detect OOMKilled containers,
  build a condition summary from the conditions array, and set output metadata
  for alert routing.

tests:
  - name: "build alert from unhealthy pod with OOMKilled container"
    input:
      metadata:
        name: "order-processor-7b4f8d6c9-xk2lp"
        namespace: "production"
        labels:
          app.kubernetes.io/name: "order-processor"
          app.kubernetes.io/version: "2.4.1"
        creationTimestamp: "2024-03-15T08:22:05Z"
      spec:
        nodeName: "ip-10-0-47-132.ec2.internal"
        containers:
          - name: "app"
            image: "registry.internal/order-processor:2.4.1"
            resources:
              limits: {cpu: "1000m", memory: "1Gi"}
          - name: "sidecar"
            image: "envoyproxy/envoy:v1.28.0"
            resources:
              limits: {cpu: "500m", memory: "256Mi"}
      status:
        phase: "Running"
        conditions:
          - {type: "Initialized", status: "True"}
          - {type: "ContainersReady", status: "False", reason: "ContainersNotReady"}
          - {type: "Ready", status: "False", reason: "ContainersNotReady"}
        startTime: "2024-03-15T08:22:05Z"
        containerStatuses:
          - name: "app"
            ready: false
            restartCount: 4
            started: false
            state:
              waiting: {reason: "CrashLoopBackOff"}
            lastState:
              terminated:
                exitCode: 137
                reason: "OOMKilled"
                startedAt: "2024-03-15T09:11:45Z"
                finishedAt: "2024-03-15T09:14:32Z"
          - name: "sidecar"
            ready: true
            restartCount: 0
            started: true
            state:
              running: {startedAt: "2024-03-15T08:22:20Z"}
            lastState: {}
    mapping: |
      $meta = input.metadata
      $spec = input.spec
      $status = input.status

      # For each unhealthy container, look up its resource limits from spec
      $unhealthy = $status.containerStatuses
        .filter(cs -> !cs.ready)
        .map(cs -> {
          $spec_c = $spec.containers
            .find(c -> c.name == cs.name).or(null)
          $last_exit = if cs.lastState.has_key("terminated") {
            cs.lastState.terminated
          } else {
            null
          }
          $current_state = match {
            cs.state.has_key("waiting") => cs.state.waiting.reason,
            cs.state.has_key("terminated") => cs.state.terminated.reason,
            _ => "Running",
          }
          {
            "name": cs.name,
            "state": $current_state,
            "last_exit_code": $last_exit?.exitCode.or(null),
            "last_exit_reason": $last_exit?.reason.or(null),
            "restart_count": cs.restartCount,
            "memory_limit": $spec_c?.resources?.limits?.memory.or(null),
            "cpu_limit": $spec_c?.resources?.limits?.cpu.or(null),
            "oom_suspected": $last_exit != null && $last_exit?.reason.or("") == "OOMKilled",
          }
        })

      # Convert conditions array to a boolean summary object
      $condition_summary = $status.conditions
        .map(c -> {"key": c.type, "value": c.status == "True"})
        .collect()

      # Severity: critical if any OOM or high restart count
      $severity = if $unhealthy.any(c -> c.oom_suspected || c.restart_count > 3) {
        "critical"
      } else if $unhealthy.length() > 0 {
        "warning"
      } else {
        "ok"
      }

      output.alert = {
        "severity": $severity,
        "source": "k8s-pod-monitor",
      }
      output.pod = {
        "name": $meta.name,
        "namespace": $meta.namespace,
        "node": $spec.nodeName,
        "app": $meta.labels."app.kubernetes.io/name",
        "version": $meta.labels."app.kubernetes.io/version",
        "phase": $status.phase,
      }
      output.unhealthy_containers = $unhealthy
      output.condition_summary = $condition_summary
      output.not_ready_reason = $status.conditions
        .find(c -> c.type == "Ready" && c.status != "True")
        .or(null)?.reason.or(null)
      output.healthy_container_count = $status.containerStatuses
        .filter(cs -> cs.ready).length()
      output.total_container_count = $status.containerStatuses.length()

      # Set metadata for alert routing
      output@.alert_severity = $severity
      output@.k8s_namespace = $meta.namespace
      output@.k8s_pod = $meta.name
    output:
      alert:
        severity: "critical"
        source: "k8s-pod-monitor"
      pod:
        name: "order-processor-7b4f8d6c9-xk2lp"
        namespace: "production"
        node: "ip-10-0-47-132.ec2.internal"
        app: "order-processor"
        version: "2.4.1"
        phase: "Running"
      unhealthy_containers:
        - name: "app"
          state: "CrashLoopBackOff"
          last_exit_code: 137
          last_exit_reason: "OOMKilled"
          restart_count: 4
          memory_limit: "1Gi"
          cpu_limit: "1000m"
          oom_suspected: true
      condition_summary:
        Initialized: true
        ContainersReady: false
        Ready: false
      not_ready_reason: "ContainersNotReady"
      healthy_container_count: 1
      total_container_count: 2
    output_metadata:
      alert_severity: "critical"
      k8s_namespace: "production"
      k8s_pod: "order-processor-7b4f8d6c9-xk2lp"
